<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Knight Orc Assault</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex; align-items: flex-start; justify-content: center;
  min-height: 100vh; font-family: Georgia, serif; overflow: hidden; user-select: none;
}
#gameContainer { position: relative; width: 800px; height: 560px; transform-origin: top center; }
canvas { display: block; }
#hud { position: absolute; top: 0; left: 0; width: 800px; height: 560px; pointer-events: none; }
#topLeft { position: absolute; top: 8px; left: 10px; color: #fff; text-shadow: 1px 1px 3px #000, 2px 2px 6px #000; }
#topLeft .score { font-size: 17px; font-weight: bold; }
#topLeft .wave  { font-size: 13px; color: #ffd700; }
#bottomBar {
  position: absolute; bottom: 0; left: 0; width: 100%;
  background: rgba(0,0,0,0.80); padding: 7px 11px;
  display: flex; align-items: center; gap: 10px;
  pointer-events: all; border-top: 2px solid rgba(255,200,50,0.3);
}
#barsSection { flex: 1; min-width: 0; }
.bar-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
.bar-label { color: #ccc; font-size: 11px; width: 26px; text-align: right; flex-shrink: 0; }
.bar-bg { flex: 1; height: 13px; background: #222; border-radius: 7px; overflow: hidden; border: 1px solid #555; position: relative; }
.bar-fill { height: 100%; border-radius: 7px; transition: width 0.1s; }
#hpFill  { background: linear-gradient(90deg,#900,#f44,#f88); }
#xpFill  { background: linear-gradient(90deg,#060,#2d2,#6f6); }
.bar-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; text-shadow: 1px 1px 2px #000; font-weight: bold; }
#levelLabel { color: #ffd700; font-size: 13px; font-weight: bold; white-space: nowrap; flex-shrink: 0; }
#regroupBtn { background: linear-gradient(180deg,#5c4,#384); color: #fff; border: 2px solid #6f5; padding: 5px 9px; border-radius: 6px; font-size: 12px; cursor: pointer; white-space: nowrap; font-weight: bold; text-shadow: 1px 1px 2px #000; flex-shrink: 0; }
#regroupBtn:hover { background: linear-gradient(180deg,#6d5,#495); }
#goldDisplay { color: #ffd700; font-size: 15px; font-weight: bold; text-shadow: 1px 1px 3px #000; white-space: nowrap; flex-shrink: 0; }
#shopBtn { background: linear-gradient(180deg,#c96,#865); color: #fff; border: 2px solid #ffd700; padding: 5px 11px; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: bold; text-shadow: 1px 1px 2px #000; flex-shrink: 0; }
#shopBtn:hover { background: linear-gradient(180deg,#da7,#976); }
#waveAnnounce { position: absolute; top: 38%; left: 50%; transform: translate(-50%,-50%); color: #ffd700; font-size: 44px; font-weight: bold; text-shadow: 2px 2px 10px #000, 0 0 30px #f80; pointer-events: none; opacity: 0; text-align: center; white-space: nowrap; z-index: 50; transition: opacity 0.3s; }
#overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.84); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; z-index: 100; }
#overlay h1 { font-size: 40px; margin-bottom: 8px; color: #ffd700; text-shadow: 0 0 20px #f80, 2px 2px 6px #000; }
.ov-sub  { font-size: 15px; margin-bottom: 8px; color: #ccc; }
.ov-hint { font-size: 12px; color: #aaa; margin-bottom: 20px; text-align: center; line-height: 2.0; }
.ov-btn { background: linear-gradient(180deg,#c96,#865); color: #fff; border: 3px solid #ffd700; padding: 11px 28px; font-size: 18px; border-radius: 10px; cursor: pointer; font-family: Georgia,serif; margin: 4px; text-shadow: 1px 1px 3px #000; }
.ov-btn:hover { background: linear-gradient(180deg,#da7,#976); }
#shopOverlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(10,7,2,0.97); border: 3px solid #c96; border-radius: 14px; padding: 20px; min-width: 310px; max-width: 370px; color: #fff; z-index: 200; display: none; box-shadow: 0 0 30px rgba(200,150,50,0.4); }
#shopOverlay h2 { text-align: center; color: #ffd700; margin-bottom: 4px; font-size: 23px; text-shadow: 0 0 10px #f80; }
#shopStats { text-align: center; color: #aaa; font-size: 11px; margin-bottom: 4px; }
#shopGoldInfo { text-align: center; color: #ffd700; margin-bottom: 11px; font-size: 14px; font-weight: bold; }
.shopItem { display: flex; justify-content: space-between; align-items: center; padding: 7px 9px; margin-bottom: 5px; background: rgba(255,255,255,0.05); border-radius: 6px; border: 1px solid #444; }
.shopItem.afford { border-color: #c8a020; box-shadow: 0 0 6px rgba(200,160,20,0.3); }
.iInfo { flex: 1; } .iName { font-size: 13px; } .iDesc { font-size: 10px; color: #888; margin-top: 1px; }
.iCost { color: #ffd700; font-size: 12px; margin: 0 9px; white-space: nowrap; }
.shopItem button { background: linear-gradient(180deg,#5c4,#384); border: 1px solid #6f5; color: #fff; padding: 4px 9px; border-radius: 4px; cursor: pointer; font-size: 12px; }
.shopItem button:hover:not(:disabled) { background: linear-gradient(180deg,#6d5,#495); }
.shopItem button:disabled { background: #333; color: #555; cursor: not-allowed; border-color: #333; }
#shopClose { display: block; width: 100%; margin-top: 10px; background: linear-gradient(180deg,#765,#543); color: #fff; border: 2px solid #c96; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 14px; font-family: Georgia,serif; }
#shopClose:hover { background: linear-gradient(180deg,#876,#654); }
@keyframes hpPulse { 0%,100%{filter:none} 50%{filter:brightness(2) saturate(2)} }
.hp-danger #hpFill { animation: hpPulse 0.55s ease-in-out infinite; }
#touchControls { position: absolute; bottom: 54px; left: 0; width: 100%; display: none; pointer-events: none; }
#joystickArea { position: absolute; bottom: 8px; left: 16px; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.25); pointer-events: all; touch-action: none; }
#joystickThumb { position: absolute; width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.45); border: 2px solid rgba(255,255,255,0.8); top: 50%; left: 50%; transform: translate(-50%,-50%); pointer-events: none; }
#attackBtn { position: absolute; bottom: 12px; right: 20px; width: 80px; height: 80px; border-radius: 50%; background: rgba(200,50,50,0.55); border: 3px solid rgba(255,100,100,0.85); color: #fff; font-size: 22px; display: flex; align-items: center; justify-content: center; pointer-events: all; cursor: pointer; touch-action: none; opacity: 0.65; }
#attackBtn:active { opacity: 0.95; background: rgba(255,80,80,0.8); }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas" width="800" height="560"></canvas>
  <div id="hud">
    <div id="topLeft">
      <div class="score">Score: <span id="scoreVal">0</span></div>
      <div class="wave">Wave <span id="waveVal">0</span>/50</div>
    </div>
    <div id="bottomBar">
      <button id="regroupBtn">REGROUP</button>
      <div id="barsSection">
        <div class="bar-row">
          <span class="bar-label">HP</span>
          <div class="bar-bg">
            <div class="bar-fill" id="hpFill" style="width:100%"></div>
            <div class="bar-text" id="hpText">120/120</div>
          </div>
        </div>
        <div class="bar-row">
          <span class="bar-label">XP</span>
          <div class="bar-bg"><div class="bar-fill" id="xpFill" style="width:0%"></div></div>
          <span id="levelLabel">Lv 1</span>
        </div>
      </div>
      <span id="goldDisplay">&#9733; 0</span>
      <button id="shopBtn">SHOP</button>
    </div>
    <div id="waveAnnounce"></div>
  </div>
  <div id="overlay">
    <h1>&#9876; KNIGHT ORC ASSAULT</h1>
    <div class="ov-sub">Defend the Kingdom &mdash; Survive 50 Waves</div>
    <div class="ov-hint">
      WASD / Arrows: Move &nbsp;|&nbsp; Mouse Click / Space: Attack<br>
      E: Open Shop between waves &nbsp;|&nbsp; Kill orcs to earn gold
    </div>
    <button class="ov-btn" id="startBtn">&#9658; PLAY</button>
  </div>
  <div id="shopOverlay">
    <h2>&#9876; SHOP</h2>
    <div id="shopStats"></div>
    <div id="shopGoldInfo">Gold: <span id="shopGoldVal">0</span> &#9733;</div>
    <div id="shopItems"></div>
    <button id="shopClose">Continue to Next Wave &#8594;</button>
  </div>
  <div id="touchControls">
    <div id="joystickArea"><div id="joystickThumb"></div></div>
    <div id="attackBtn">&#9876;</div>
  </div>
</div>
<script>
'use strict';
// ═══════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════
var CW = 800, CH = 560, ARENA_BOTTOM = 512;
var canvas = document.getElementById('gameCanvas');
var ctx    = canvas.getContext('2d');

// ═══════════════════════════════════════════════
// SCALING
// ═══════════════════════════════════════════════
function scaleGame() {
  var s  = Math.min(window.innerWidth / CW, window.innerHeight / CH);
  var gc = document.getElementById('gameContainer');
  gc.style.transform = 'scale(' + s + ')';
  gc.style.transformOrigin = 'top center';
  if (window.innerWidth < 768) document.getElementById('touchControls').style.display = 'block';
}
scaleGame();
window.addEventListener('resize', scaleGame);

// ═══════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════
var _audioCtx = null;
function getAC() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}
function playSound(type) {
  try {
    var a = getAC(), t = a.currentTime;
    function tone(freq, ot, dur, vol, ef) {
      var o = a.createOscillator(), g = a.createGain();
      o.type = ot || 'sine';
      o.frequency.setValueAtTime(freq, t);
      if (ef) o.frequency.exponentialRampToValueAtTime(ef, t + dur);
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      o.connect(g); g.connect(a.destination); o.start(t); o.stop(t + dur);
    }
    if (type === 'swing') {
      tone(420, 'sine', 0.11, 0.09, 190);
      var bs = Math.ceil(a.sampleRate * 0.07);
      var buf = a.createBuffer(1, bs, a.sampleRate);
      var d = buf.getChannelData(0);
      for (var i = 0; i < bs; i++) d[i] = Math.random() * 2 - 1;
      var ns = a.createBufferSource(), ng = a.createGain();
      ns.buffer = buf; ng.gain.setValueAtTime(0.06, t); ng.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
      ns.connect(ng); ng.connect(a.destination); ns.start(t); ns.stop(t + 0.07);
    } else if (type === 'orcHit')     tone(110, 'sine',     0.09, 0.22, 55);
    else if   (type === 'coin')       tone(920, 'sine',     0.07, 0.10, 1250);
    else if   (type === 'playerHurt') tone(150, 'sawtooth', 0.22, 0.16, 72);
    else if   (type === 'waveEnd')   { tone(660, 'sine', 0.28, 0.13); tone(784, 'sine', 0.28, 0.11); }
    else if   (type === 'levelUp') {
      [261, 329, 392].forEach(function(f, i) {
        var o2 = a.createOscillator(), g2 = a.createGain();
        o2.type = 'sine'; o2.frequency.setValueAtTime(f, t + i * 0.14);
        g2.gain.setValueAtTime(0, t + i * 0.14);
        g2.gain.linearRampToValueAtTime(0.17, t + i * 0.14 + 0.01);
        g2.gain.exponentialRampToValueAtTime(0.001, t + i * 0.14 + 0.22);
        o2.connect(g2); g2.connect(a.destination);
        o2.start(t + i * 0.14); o2.stop(t + i * 0.14 + 0.22);
      });
    }
  } catch(_) {}
}

// ═══════════════════════════════════════════════
// ENVIRONMENT CANVAS  (drawn once, blitted each frame)
// ═══════════════════════════════════════════════
var envCanvas = document.createElement('canvas');
envCanvas.width = CW; envCanvas.height = ARENA_BOTTOM;
(function buildEnv() {
  var e = envCanvas.getContext('2d');
  // Ground
  e.fillStyle = '#c8a870'; e.fillRect(0, 0, CW, ARENA_BOTTOM);
  // Ground variation
  e.fillStyle = 'rgba(155,115,55,0.18)';
  for (var i = 0; i < 22; i++) {
    e.beginPath();
    e.ellipse(55 + i*36, 38 + (i*77)%440, 16+(i*11)%14, 9, (i*0.33)%Math.PI, 0, Math.PI*2);
    e.fill();
  }
  // Center path
  e.fillStyle = 'rgba(100,65,20,0.30)';
  e.beginPath(); e.ellipse(CW/2, ARENA_BOTTOM*0.55, CW*0.46, 40, 0, 0, Math.PI*2); e.fill();

  // ── Castle (left strip 0..145) ──
  (function() {
    var x=0, w=145, h=ARENA_BOTTOM;
    e.fillStyle='#6a7278'; e.fillRect(x,0,w,h);
    e.fillStyle='#585f65';
    for (var row=0; row<20; row++) {
      var off=(row%2)*22;
      for (var col=0; col<5; col++) e.fillRect(x+off+col*44+1, row*28+1, 40, 24);
    }
    e.fillStyle='#484e54'; e.fillRect(x+w-6,0,6,h);
    e.fillStyle='#808890';
    for (var bi=0; bi<7; bi++) { if (bi%2===0) e.fillRect(x+bi*20,0,18,26); }
    // Gate arch
    e.fillStyle='#111';
    e.beginPath(); e.arc(x+w/2,h-54,22,Math.PI,0); e.lineTo(x+w/2+22,h); e.lineTo(x+w/2-22,h); e.closePath(); e.fill();
    e.strokeStyle='#333'; e.lineWidth=2.5;
    for (var gi=0; gi<4; gi++) {
      e.beginPath(); e.moveTo(x+w/2-15+gi*10,h-76); e.lineTo(x+w/2-15+gi*10,h); e.stroke();
    }
    e.beginPath(); e.moveTo(x+w/2-20,h-44); e.lineTo(x+w/2+20,h-44); e.stroke();
    // Window
    e.globalAlpha=0.72; e.fillStyle='#ffcc55';
    e.beginPath(); e.arc(x+w/2,h*0.35,11,Math.PI,0); e.lineTo(x+w/2+11,h*0.35+14); e.lineTo(x+w/2-11,h*0.35+14); e.closePath(); e.fill();
    e.globalAlpha=1;
  })();

  // ── Village (right strip 655..800) ──
  (function() {
    var vx=655, h=ARENA_BOTTOM;
    e.fillStyle='#8c7050'; e.fillRect(vx,0,CW-vx,h);
    e.fillStyle='#c09060'; e.fillRect(vx+14,h-118,88,118);
    e.fillStyle='#7a3a08'; e.beginPath(); e.moveTo(vx+9,h-118); e.lineTo(vx+58,h-162); e.lineTo(vx+107,h-118); e.closePath(); e.fill();
    e.fillStyle='#ffcc44'; e.globalAlpha=0.68; e.fillRect(vx+24,h-98,22,20); e.fillRect(vx+63,h-98,22,20); e.globalAlpha=1;
    e.fillStyle='#b07844'; e.fillRect(vx+112,h-88,68,88);
    e.fillStyle='#882808'; e.beginPath(); e.moveTo(vx+107,h-88); e.lineTo(vx+146,h-126); e.lineTo(vx+185,h-88); e.closePath(); e.fill();
    e.fillStyle='#ffcc44'; e.globalAlpha=0.68; e.fillRect(vx+130,h-72,20,17); e.globalAlpha=1;
    e.fillStyle='#8b5520';
    for (var fi=0; fi<10; fi++) { e.fillRect(vx+fi*16+8,h-44,5,44); e.fillRect(vx+fi*16+7,h-48,7,8); }
    e.fillRect(vx+8,h-34,148,4); e.fillRect(vx+8,h-20,148,4);
  })();

  // ── Trees ──
  [[170,80],[173,218],[167,372],[171,492],[623,90],[627,268],[631,432]].forEach(function(pt) {
    var tx=pt[0], ty=pt[1];
    e.fillStyle='#6b4226'; e.fillRect(tx-5,ty,10,30);
    [{dy:-7,r:26,col:'rgba(28,84,18,0.58)'},{dy:-18,r:21,col:'rgba(38,114,22,0.72)'},{dy:-27,r:16,col:'rgba(52,140,28,0.86)'}].forEach(function(l) {
      e.fillStyle=l.col; e.beginPath(); e.arc(tx,ty+l.dy,l.r,0,Math.PI*2); e.fill();
    });
  });

  // ── Well ──
  (function() {
    var wx=CW/2-82, wy=ARENA_BOTTOM*0.40;
    e.fillStyle='#888'; e.beginPath(); e.ellipse(wx,wy+20,22,8,0,0,Math.PI*2); e.fill();
    e.fillStyle='#b0b0b0'; e.beginPath(); e.arc(wx,wy,20,Math.PI,0); e.lineTo(wx+20,wy+20); e.lineTo(wx-20,wy+20); e.closePath(); e.fill();
    e.fillStyle='#666'; e.beginPath(); e.ellipse(wx,wy,20,7,0,0,Math.PI*2); e.fill();
    e.strokeStyle='#6b4226'; e.lineWidth=4;
    e.beginPath(); e.moveTo(wx-24,wy-7); e.lineTo(wx+24,wy-7); e.stroke();
    e.beginPath(); e.moveTo(wx,wy-7); e.lineTo(wx,wy-22); e.stroke();
    e.strokeStyle='#555'; e.lineWidth=1.5; e.beginPath(); e.moveTo(wx,wy-7); e.lineTo(wx,wy+2); e.stroke();
  })();

  // ── Grass tufts ──
  e.fillStyle='rgba(80,130,40,0.28)';
  [[290,58],[448,146],[353,396],[512,326],[256,490],[596,178],[587,496]].forEach(function(g) {
    e.beginPath(); e.ellipse(g[0],g[1],20,10,0,0,Math.PI*2); e.fill();
  });
})();

// ═══════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════
var keys  = {};
var mouse = { x: CW/2, y: CH/2 };

window.addEventListener('keydown', function(e) {
  keys[e.code] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].indexOf(e.key) !== -1) e.preventDefault();
  if (e.code === 'Space'  && gs.state === 'playing') gs.wantsAttack = true;
  if (e.code === 'KeyE') {
    if (gs.state === 'shop')    closeShop();
    if (gs.state === 'between') openShop();
  }
});
window.addEventListener('keyup', function(e) { delete keys[e.code]; });

canvas.addEventListener('mousemove', function(e) {
  var r = canvas.getBoundingClientRect(), sc = CW / r.width;
  mouse.x = (e.clientX - r.left) * sc;
  mouse.y = (e.clientY - r.top)  * sc;
});
canvas.addEventListener('mousedown', function() {
  try { getAC(); } catch(_) {}
  if (gs.state === 'playing') gs.wantsAttack = true;
});

// Touch joystick
var joystickArea  = document.getElementById('joystickArea');
var joystickThumb = document.getElementById('joystickThumb');
var attackBtnEl   = document.getElementById('attackBtn');
var _joyId = null, _joyOx = 0, _joyOy = 0;

joystickArea.addEventListener('touchstart', function(e) {
  e.preventDefault(); try { getAC(); } catch(_) {}
  var touch = e.changedTouches[0], r = joystickArea.getBoundingClientRect();
  _joyId = touch.identifier; _joyOx = r.left + r.width/2; _joyOy = r.top + r.height/2;
}, { passive: false });

joystickArea.addEventListener('touchmove', function(e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) {
    var touch = e.changedTouches[i];
    if (touch.identifier !== _joyId) continue;
    var dx = touch.clientX - _joyOx, dy = touch.clientY - _joyOy;
    var dist = Math.min(36, Math.sqrt(dx*dx + dy*dy));
    var ang  = Math.atan2(dy, dx);
    joystickThumb.style.transform = 'translate(calc(-50% + ' + (Math.cos(ang)*dist) + 'px), calc(-50% + ' + (Math.sin(ang)*dist) + 'px))';
    keys._joyX = dist > 4 ? Math.cos(ang) : 0;
    keys._joyY = dist > 4 ? Math.sin(ang) : 0;
  }
}, { passive: false });

function endJoy(e) {
  e.preventDefault(); keys._joyX = 0; keys._joyY = 0;
  joystickThumb.style.transform = 'translate(-50%,-50%)'; _joyId = null;
}
joystickArea.addEventListener('touchend',    endJoy, { passive: false });
joystickArea.addEventListener('touchcancel', endJoy, { passive: false });

attackBtnEl.addEventListener('touchstart', function(e) {
  e.preventDefault(); try { getAC(); } catch(_) {}
  if (gs.state === 'playing') gs.wantsAttack = true;
}, { passive: false });

document.getElementById('regroupBtn').addEventListener('click', regroupSoldiers);
document.getElementById('shopBtn').addEventListener('click', function() {
  if (gs.state === 'between' || gs.state === 'shop') openShop();
});
document.getElementById('shopClose').addEventListener('click', closeShop);
document.getElementById('startBtn').addEventListener('click', function() {
  try { getAC(); } catch(_) {} startGame();
});

// ═══════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════
var gs = {};

function makePlayer() {
  return {
    x: CW/2, y: ARENA_BOTTOM/2,
    hp: 120, maxHp: 120, speed: 160,
    dmg: 25, attackCd: 0, attackRate: 0.55,
    angle: 0, invTimer: 0,
    xp: 0, xpNext: 80, level: 1,
    gold: 0, atkBoost: 0
  };
}

function resetGS() {
  if (gs.raf) cancelAnimationFrame(gs.raf);
  gs = {
    state: 'menu', wave: 0, score: 0,
    raf: null, lastTime: 0, wantsAttack: false,
    shakeTimer: 0, announceTimer: 0,
    player: makePlayer(),
    orcs: [], soldiers: [], coins: [],
    particles: [], arcs: [],
    spawnQueue: [], spawnTimer: 0,
    confetti: []
  };
}
resetGS();

// ═══════════════════════════════════════════════
// ORC FACTORY
// ═══════════════════════════════════════════════
var ORC_CFGS = {
  grunt:    { r:13, spd:52,  hp:30,  dmg:8,  col:'#44cc44', col2:'#228822' },
  goblin:   { r:10, spd:80,  hp:18,  dmg:6,  col:'#88ee22', col2:'#558811' },
  armoured: { r:14, spd:44,  hp:55,  dmg:12, col:'#7799bb', col2:'#4466aa' },
  ranged:   { r:11, spd:40,  hp:25,  dmg:10, col:'#ccaa44', col2:'#886622' },
  boss:     { r:26, spd:32,  hp:220, dmg:18, col:'#226622', col2:'#113311' }
};

function pickOrcType(wave) {
  var r = Math.random();
  if (wave >= 12 && r < 0.13) return 'ranged';
  if (wave >= 8  && r < 0.25) return 'armoured';
  if (wave >= 3  && r < 0.40) return 'goblin';
  return 'grunt';
}

function makeOrc(wave, isBoss) {
  var type = isBoss ? 'boss' : pickOrcType(wave);
  var side = Math.floor(Math.random() * 4), sx, sy;
  if      (side === 0) { sx = Math.random() * CW;    sy = -25; }
  else if (side === 1) { sx = CW + 25;               sy = Math.random() * ARENA_BOTTOM; }
  else if (side === 2) { sx = Math.random() * CW;    sy = ARENA_BOTTOM + 25; }
  else                 { sx = -25;                    sy = Math.random() * ARENA_BOTTOM; }
  var cfg = ORC_CFGS[type], ws = 1 + (wave-1)*0.06, hp = Math.round(cfg.hp * ws);
  return {
    x: sx, y: sy, type: type, boss: isBoss || false, r: cfg.r,
    speed: cfg.spd * (1 + (wave-1)*0.04),
    hp: hp, maxHp: hp, dmg: cfg.dmg * ws,
    col: cfg.col, col2: cfg.col2,
    kbVx: 0, kbVy: 0, kbTimer: 0,
    shootTimer: type === 'ranged' ? 2.5 : 0,
    dead: false, legPhase: Math.random() * Math.PI * 2
  };
}

// ═══════════════════════════════════════════════
// SOLDIER FACTORY
// ═══════════════════════════════════════════════
var SOLDIER_NAMES = ['Sir Aldric','Brother Wulf','Lady Mara'];
function makeSoldier(idx) {
  var p = gs.player;
  return { x: p.x+(Math.random()-0.5)*44, y: p.y+(Math.random()-0.5)*44, name: SOLDIER_NAMES[idx%3], hp: 60, maxHp: 60, speed: 148, dmg: 18, attackCd: 0, angle: 0, dead: false };
}

// ═══════════════════════════════════════════════
// WAVE MANAGEMENT
// ═══════════════════════════════════════════════
function startWave() {
  gs.wave++; gs.state = 'playing'; gs.spawnQueue = []; gs.spawnTimer = 0; gs.wantsAttack = false;
  var count = 4 + Math.floor(gs.wave * 1.8);
  for (var i = 0; i < count; i++) gs.spawnQueue.push(false);
  if (gs.wave % 5 === 0) gs.spawnQueue.push(true);
  showAnnounce('WAVE ' + gs.wave, 2.0);
}

function showAnnounce(msg, dur) {
  gs.announceTimer = dur;
  var el = document.getElementById('waveAnnounce');
  el.textContent = msg; el.style.opacity = '1';
}
function hideAnnounce() {
  document.getElementById('waveAnnounce').style.opacity = '0';
  gs.announceTimer = 0;
}

function onWaveComplete() {
  playSound('waveEnd');
  if (gs.wave >= 50) { triggerWin(); return; }
  gs.state = 'between';
  showAnnounce('WAVE ' + gs.wave + ' COMPLETE!', 1.5);
  setTimeout(function() { hideAnnounce(); openShop(); }, 1700);
}

// ═══════════════════════════════════════════════
// ATTACK
// ═══════════════════════════════════════════════
function doAttack() {
  var p = gs.player;
  gs.wantsAttack = false;
  p.attackCd = p.attackRate * Math.pow(0.82, p.atkBoost);
  playSound('swing');
  // Face mouse
  var mdx = mouse.x - p.x, mdy = mouse.y - p.y;
  if (mdx*mdx + mdy*mdy > 25) p.angle = Math.atan2(mdy, mdx);
  // Arc visual
  gs.arcs.push({ x: p.x, y: p.y, angle: p.angle, life: 0.35, maxLife: 0.35 });
  // Hit check — 120deg arc, 80px reach
  var halfArc = Math.PI / 3;
  for (var i = 0; i < gs.orcs.length; i++) {
    var orc = gs.orcs[i];
    if (orc.dead) continue;
    var ex = orc.x - p.x, ey = orc.y - p.y;
    if (Math.sqrt(ex*ex + ey*ey) > 80 + orc.r) continue;
    var diff = Math.atan2(ey, ex) - p.angle;
    while (diff >  Math.PI) diff -= Math.PI*2;
    while (diff < -Math.PI) diff += Math.PI*2;
    if (Math.abs(diff) > halfArc) continue;
    hitOrc(orc, p.dmg, Math.atan2(ey, ex));
  }
  // Soldiers hit nearby
  for (var si = 0; si < gs.soldiers.length; si++) {
    var sol = gs.soldiers[si];
    if (sol.dead) continue;
    for (var oi = 0; oi < gs.orcs.length; oi++) {
      var o2 = gs.orcs[oi];
      if (o2.dead) continue;
      var ddx = o2.x - sol.x, ddy = o2.y - sol.y;
      if (ddx*ddx + ddy*ddy < 58*58) { hitOrc(o2, sol.dmg, Math.atan2(ddy, ddx)); break; }
    }
  }
}

function hitOrc(orc, dmg, kbAngle) {
  orc.hp -= dmg;
  playSound('orcHit');
  orc.kbVx = Math.cos(kbAngle) * 155; orc.kbVy = Math.sin(kbAngle) * 155; orc.kbTimer = 0.25;
  spawnDmgNum(orc.x, orc.y - orc.r, dmg, '#ff6');
  for (var i = 0; i < 6; i++) {
    var a = Math.random() * Math.PI * 2;
    addParticle('dot', orc.x, orc.y, Math.cos(a)*88, Math.sin(a)*88, 0.4, '#f64', null);
  }
  if (orc.hp <= 0) killOrc(orc);
}

function killOrc(orc) {
  if (orc.dead) return;
  orc.dead = true;
  var goldVal = orc.boss ? 25 : (orc.type === 'armoured' ? 8 : 4) + Math.floor(gs.wave/5);
  var coinCnt = orc.boss ? 5 : 1;
  for (var i = 0; i < coinCnt; i++) {
    gs.coins.push({ x: orc.x+(Math.random()-0.5)*22, y: orc.y+(Math.random()-0.5)*22, val: goldVal, vx: (Math.random()-0.5)*68, vy: (Math.random()-0.5)*68 });
  }
  gs.player.xp += orc.boss ? 40 : 10;
  gs.score     += orc.boss ? 200 : 50;
  checkLevelUp();
}

function checkLevelUp() {
  var p = gs.player;
  while (p.xp >= p.xpNext) {
    p.xp -= p.xpNext; p.level++; p.xpNext = Math.round(p.xpNext * 1.35);
    p.maxHp += 10; p.hp = Math.min(p.hp + 20, p.maxHp); p.dmg += 3;
    playSound('levelUp'); spawnDmgNum(p.x, p.y - 32, 'LEVEL UP!', '#ffd700');
  }
}

// ═══════════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════════
function addParticle(type, x, y, vx, vy, life, col, extra) {
  if (gs.particles.length >= 200) return;
  var p2 = { type: type, x: x, y: y, vx: vx, vy: vy, life: life, maxLife: life, col: col };
  if (extra) Object.keys(extra).forEach(function(k) { p2[k] = extra[k]; });
  gs.particles.push(p2);
}
function spawnDmgNum(x, y, val, col) {
  addParticle('dmgNum', x, y, 0, -52, 0.85, col, { val: String(val) });
}

// SHOP
// ═══════════════════════════════════════════════
var SHOP_ITEMS = [
  { id:'heal',    name:'Heal 60 HP',       desc:'Restore 60 hit points',         cost:30, max:99 },
  { id:'maxhp',   name:'Max HP +25',        desc:'Permanently increase max HP',   cost:50, max:99 },
  { id:'dmg',     name:'Damage +12',        desc:'Hit harder',                    cost:60, max:99 },
  { id:'speed',   name:'Speed +25',         desc:'Move faster',                   cost:55, max:99 },
  { id:'atkspd',  name:'Faster Attack',     desc:'Shorter cooldown (max 3x)',      cost:70, max:3  },
  { id:'soldier', name:'Hire Soldier',      desc:'Ally fights at your side',      cost:80, max:3  }
];
var shopCounts = {};
SHOP_ITEMS.forEach(function(it) { shopCounts[it.id] = 0; });

function openShop() {
  gs.state = 'shop';
  var p = gs.player;
  document.getElementById('shopStats').textContent = 'HP: '+Math.ceil(p.hp)+'/'+p.maxHp+'  |  DMG: '+p.dmg+'  |  SPD: '+Math.round(p.speed)+'  |  Lv '+p.level;
  document.getElementById('shopGoldVal').textContent = p.gold;
  var cont = document.getElementById('shopItems'); cont.innerHTML = '';
  SHOP_ITEMS.forEach(function(item) {
    var maxed = shopCounts[item.id] >= item.max, canBuy = p.gold >= item.cost && !maxed;
    var div = document.createElement('div'); div.className = 'shopItem' + (canBuy ? ' afford' : '');
    var cntStr = item.max < 99 ? ' (' + shopCounts[item.id] + '/' + item.max + ')' : '';
    div.innerHTML = '<div class="iInfo"><div class="iName">'+item.name+cntStr+'</div><div class="iDesc">'+item.desc+'</div></div><span class="iCost">'+item.cost+'&#9733;</span><button '+(canBuy?'':'disabled')+' data-id="'+item.id+'">Buy</button>';
    cont.appendChild(div);
  });
  cont.querySelectorAll('button[data-id]').forEach(function(btn) {
    btn.addEventListener('click', function() { buyItem(btn.getAttribute('data-id')); });
  });
  document.getElementById('shopOverlay').style.display = 'block';
}

function buyItem(id) {
  var p = gs.player, item = null;
  for (var i = 0; i < SHOP_ITEMS.length; i++) { if (SHOP_ITEMS[i].id === id) { item = SHOP_ITEMS[i]; break; } }
  if (!item || p.gold < item.cost || shopCounts[id] >= item.max) return;
  p.gold -= item.cost; shopCounts[id]++;
  if      (id === 'heal')    p.hp = Math.min(p.maxHp, p.hp + 60);
  else if (id === 'maxhp')   { p.maxHp += 25; p.hp = Math.min(p.maxHp, p.hp + 10); }
  else if (id === 'dmg')     p.dmg   += 12;
  else if (id === 'speed')   p.speed += 25;
  else if (id === 'atkspd')  p.atkBoost++;
  else if (id === 'soldier') gs.soldiers.push(makeSoldier(gs.soldiers.length));
  openShop(); updateHUD();
}

function closeShop() {
  document.getElementById('shopOverlay').style.display = 'none';
  var alive = 0;
  for (var i = 0; i < gs.orcs.length; i++) { if (!gs.orcs[i].dead) alive++; }
  if (alive === 0 && gs.spawnQueue.length === 0) startWave();
  else gs.state = 'playing';
}

function regroupSoldiers() {
  var p = gs.player;
  gs.soldiers.forEach(function(s, i) {
    s.x = p.x + Math.cos(Math.PI*2/3*i) * 36;
    s.y = p.y + Math.sin(Math.PI*2/3*i) * 36;
  });
}

// ═══════════════════════════════════════════════
// GAME FLOW
// ═══════════════════════════════════════════════
function startGame() {
  resetGS();
  SHOP_ITEMS.forEach(function(it) { shopCounts[it.id] = 0; });
  document.getElementById('overlay').style.display = 'none';
  updateHUD();
  gs.lastTime = performance.now();
  gs.raf = requestAnimationFrame(loop);
  setTimeout(startWave, 400);
}

function triggerGameOver() {
  if (gs.state === 'gameover') return;
  gs.state = 'gameover'; cancelAnimationFrame(gs.raf);
  var ov = document.getElementById('overlay');
  ov.innerHTML = '<h1>&#9760; DEFEAT</h1><div class="ov-sub">You fell on wave '+gs.wave+'</div><div class="ov-hint">Score: '+gs.score+'</div><button class="ov-btn" id="startBtn">&#8635; Try Again</button>';
  ov.style.display = 'flex';
  document.getElementById('startBtn').addEventListener('click', function() { try{getAC();}catch(_){} startGame(); });
}

function triggerWin() {
  gs.state = 'win'; cancelAnimationFrame(gs.raf); spawnConfetti();
  var ov = document.getElementById('overlay');
  ov.innerHTML = '<h1>&#9813; VICTORY!</h1><div class="ov-sub">All 50 waves defeated!</div><div class="ov-hint">Final Score: '+gs.score+'<br>Level: '+gs.player.level+'</div><button class="ov-btn" id="startBtn">&#9658; Play Again</button>';
  ov.style.display = 'flex';
  document.getElementById('startBtn').addEventListener('click', function() { try{getAC();}catch(_){} startGame(); });
  (function wl() {
    if (gs.state !== 'win') return;
    ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fillRect(0,0,CW,CH);
    tickConfetti(1/60); drawConfetti();
    requestAnimationFrame(wl);
  })();
}

// Confetti
function spawnConfetti() {
  var cols = ['#ff4444','#ffd700','#44ff44','#4488ff','#ff44ff','#ffaa00'];
  gs.confetti = [];
  for (var i = 0; i < 52; i++) gs.confetti.push({ x: Math.random()*CW, y: -10-Math.random()*100, vx: (Math.random()-0.5)*58, vy: 52+Math.random()*68, col: cols[Math.floor(Math.random()*cols.length)], w: 7+Math.random()*5, h: 4+Math.random()*3, rot: Math.random()*Math.PI*2, rotV: (Math.random()-0.5)*4 });
}
function tickConfetti(dt) {
  for (var i = 0; i < gs.confetti.length; i++) { var c=gs.confetti[i]; c.x+=c.vx*dt; c.y+=c.vy*dt; c.rot+=c.rotV*dt; if(c.y>CH+20){c.y=-10;c.x=Math.random()*CW;} }
}
function drawConfetti() {
  for (var i = 0; i < gs.confetti.length; i++) { var c=gs.confetti[i]; ctx.save(); ctx.translate(c.x,c.y); ctx.rotate(c.rot); ctx.fillStyle=c.col; ctx.fillRect(-c.w/2,-c.h/2,c.w,c.h); ctx.restore(); }
}

// ═══════════════════════════════════════════════
// HUD
// ═══════════════════════════════════════════════
function updateHUD() {
  var p = gs.player, hpPct = Math.max(0, p.hp/p.maxHp*100);
  document.getElementById('hpFill').style.width   = hpPct + '%';
  document.getElementById('hpText').textContent   = Math.ceil(p.hp) + '/' + p.maxHp;
  document.getElementById('xpFill').style.width   = (p.xp/p.xpNext*100) + '%';
  document.getElementById('levelLabel').textContent = 'Lv ' + p.level;
  document.getElementById('scoreVal').textContent   = gs.score;
  document.getElementById('waveVal').textContent    = gs.wave;
  document.getElementById('goldDisplay').innerHTML  = '&#9733; ' + p.gold;

  if (hpPct < 25) bar.classList.add('hp-danger'); else bar.classList.remove('hp-danger');
}

// ═══════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════
function loop(ts) {
  gs.raf = requestAnimationFrame(loop);
  var dt = Math.min((ts - gs.lastTime) / 1000, 0.05);
  gs.lastTime = ts;
  try {
    if (gs.state === 'playing') update(dt);
    draw();
  } catch(e) { console.warn('loop error:', e); }
  if (gs.state === 'playing' || gs.state === 'between' || gs.state === 'shop') updateHUD();
}

// ═══════════════════════════════════════════════
// UPDATE
// ═══════════════════════════════════════════════
function update(dt) {
  var p = gs.player, i, j, orc, sol;

  // Spawn queue
  gs.spawnTimer -= dt;
  if (gs.spawnTimer <= 0 && gs.spawnQueue.length > 0) {
    gs.orcs.push(makeOrc(gs.wave, gs.spawnQueue.shift()));
    gs.spawnTimer = 0.2;
  }

  // Announcer / shake countdowns
  if (gs.announceTimer > 0) { gs.announceTimer -= dt; if (gs.announceTimer <= 0) hideAnnounce(); }
  if (gs.shakeTimer > 0) gs.shakeTimer -= dt;

  // ── Player movement ──
  var mvx = 0, mvy = 0;
  if (keys['KeyW']     || keys['ArrowUp'])    mvy -= 1;
  if (keys['KeyS']     || keys['ArrowDown'])  mvy += 1;
  if (keys['KeyA']     || keys['ArrowLeft'])  mvx -= 1;
  if (keys['KeyD']     || keys['ArrowRight']) mvx += 1;
  if (keys._joyX) mvx += keys._joyX;
  if (keys._joyY) mvy += keys._joyY;

  var mvLen = Math.sqrt(mvx*mvx + mvy*mvy);
  if (mvLen > 0.01) {
    mvx /= mvLen; mvy /= mvLen;
    p.x += mvx * p.speed * dt;
    p.y += mvy * p.speed * dt;
    p.angle = Math.atan2(mvy, mvx);
  }
  // Always face mouse
  var mdx = mouse.x - p.x, mdy = mouse.y - p.y;
  if (mdx*mdx + mdy*mdy > 400) p.angle = Math.atan2(mdy, mdx);

  // Clamp to arena
  p.x = Math.max(18, Math.min(CW - 18, p.x));
  p.y = Math.max(18, Math.min(ARENA_BOTTOM - 18, p.y));

  // Attack
  if (p.attackCd > 0) p.attackCd -= dt;
  if (gs.wantsAttack && p.attackCd <= 0) doAttack();
  else gs.wantsAttack = false;

  // Invincibility
  if (p.invTimer > 0) p.invTimer -= dt;

  // ── Orcs ──
  for (i = 0; i < gs.orcs.length; i++) {
    orc = gs.orcs[i];
    if (orc.dead) continue;
    orc.legPhase += dt * 7;

    if (orc.kbTimer > 0) {
      orc.kbTimer -= dt;
      orc.x += orc.kbVx * dt; orc.y += orc.kbVy * dt;
      var kd = Math.pow(0.001, dt); orc.kbVx *= kd; orc.kbVy *= kd;
    } else {
      var dx = p.x - orc.x, dy = p.y - orc.y, dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 1) { orc.x += (dx/dist)*orc.speed*dt; orc.y += (dy/dist)*orc.speed*dt; }
    }

    orc.x = Math.max(orc.r, Math.min(CW - orc.r, orc.x));
    orc.y = Math.max(orc.r, Math.min(ARENA_BOTTOM - orc.r, orc.y));

    // Separation
    for (j = i+1; j < gs.orcs.length; j++) {
      var other = gs.orcs[j];
      if (other.dead) continue;
      var sx = orc.x - other.x, sy = orc.y - other.y, sd = Math.sqrt(sx*sx + sy*sy), minD = orc.r + other.r;
      if (sd < minD && sd > 0.1) {
        var push = (minD - sd) * 0.5 / sd;
        orc.x += sx*push; orc.y += sy*push; other.x -= sx*push; other.y -= sy*push;
      }
    }

    // Ranged shoot
    if (orc.type === 'ranged') {
      orc.shootTimer -= dt;
      if (orc.shootTimer <= 0) {
        orc.shootTimer = 2.5;
        var ang = Math.atan2(p.y - orc.y, p.x - orc.x);
        addParticle('proj', orc.x, orc.y, Math.cos(ang)*140, Math.sin(ang)*140, 2.2, '#888', { dmg: orc.dmg*0.7 });
      }
    }

    // Contact damage
    if (p.invTimer <= 0) {
      var cdx = p.x - orc.x, cdy = p.y - orc.y;
      if (Math.sqrt(cdx*cdx + cdy*cdy) < 16 + orc.r) {
        p.hp -= orc.dmg * dt * 2.2;
        p.invTimer = 0.6; gs.shakeTimer = 0.3;
        playSound('playerHurt');
        if (p.hp <= 0) { triggerGameOver(); return; }
      }
    }
  }

  // Remove dead orcs, check wave end
  var alive = 0, newOrcs = [];
  for (i = 0; i < gs.orcs.length; i++) { if (!gs.orcs[i].dead) { newOrcs.push(gs.orcs[i]); alive++; } }
  gs.orcs = newOrcs;
  if (alive === 0 && gs.spawnQueue.length === 0 && gs.state === 'playing') onWaveComplete();

  // ── Coins ──
  var newCoins = [], coin;
  for (i = 0; i < gs.coins.length; i++) {
    coin = gs.coins[i];
    var cdx2 = p.x - coin.x, cdy2 = p.y - coin.y, cd2 = Math.sqrt(cdx2*cdx2 + cdy2*cdy2);
    if (cd2 < 92 && cd2 > 0.5) { coin.vx += (cdx2/cd2)*185*dt; coin.vy += (cdy2/cd2)*185*dt; }
    var drag = Math.pow(0.04, dt); coin.vx *= drag; coin.vy *= drag;
    coin.x += coin.vx * dt; coin.y += coin.vy * dt;
    if (cd2 < 14) { p.gold += coin.val; playSound('coin'); }
    else newCoins.push(coin);
  }
  gs.coins = newCoins;

  // ── Particles ──
  var newParts = [], pt;
  for (i = 0; i < gs.particles.length; i++) {
    pt = gs.particles[i]; pt.life -= dt;
    if (pt.life <= 0) continue;
    if (pt.type === 'dot') {
      pt.x += pt.vx*dt; pt.y += pt.vy*dt;
      var dd = Math.pow(0.01, dt); pt.vx *= dd; pt.vy *= dd;
    } else if (pt.type === 'dmgNum') {
      pt.y += pt.vy * dt;
    } else if (pt.type === 'proj') {
      pt.x += pt.vx*dt; pt.y += pt.vy*dt;
      if (p.invTimer <= 0) {
        var ppx = p.x - pt.x, ppy = p.y - pt.y;
        if (ppx*ppx + ppy*ppy < 256) {
          p.hp -= pt.dmg; p.invTimer = 0.6; gs.shakeTimer = 0.2;
          playSound('playerHurt'); pt.life = 0;
          if (p.hp <= 0) { triggerGameOver(); return; }
        }
      }
    }
    if (pt.life > 0) newParts.push(pt);
  }
  gs.particles = newParts;

  // ── Arcs ──
  var newArcs = [];
  for (i = 0; i < gs.arcs.length; i++) { gs.arcs[i].life -= dt; if (gs.arcs[i].life > 0) newArcs.push(gs.arcs[i]); }
  gs.arcs = newArcs;

  // ── Soldiers ──
  for (i = 0; i < gs.soldiers.length; i++) {
    sol = gs.soldiers[i]; if (sol.dead) continue;
    var sdx = p.x - sol.x, sdy = p.y - sol.y, sd2 = Math.sqrt(sdx*sdx + sdy*sdy);
    if (sd2 > 82) { sol.x += (sdx/sd2)*sol.speed*dt; sol.y += (sdy/sd2)*sol.speed*dt; }
    if (sd2 > 5) sol.angle = Math.atan2(sdy, sdx);
    sol.attackCd -= dt;
    if (sol.attackCd <= 0) {
      var nearest = null, nearD = 80;
      for (j = 0; j < gs.orcs.length; j++) {
        if (gs.orcs[j].dead) continue;
        var od = Math.sqrt(Math.pow(gs.orcs[j].x-sol.x,2)+Math.pow(gs.orcs[j].y-sol.y,2));
        if (od < nearD) { nearD = od; nearest = gs.orcs[j]; }
      }
      if (nearest) { playSound('swing'); sol.attackCd = 0.82; hitOrc(nearest, sol.dmg, Math.atan2(nearest.y-sol.y, nearest.x-sol.x)); }
    }
  }
}

// ═══════════════════════════════════════════════
// DRAW
// ═══════════════════════════════════════════════
function draw() {
  ctx.clearRect(0, 0, CW, CH);
  ctx.save();
  if (gs.shakeTimer > 0) ctx.translate((Math.random()-0.5)*10, (Math.random()-0.5)*10);

  if (gs.state === 'menu') {
    drawMenuBg();
  } else {
    ctx.drawImage(envCanvas, 0, 0);
    if (gs.state === 'playing' || gs.state === 'between' || gs.state === 'shop') {
      drawArcs(); drawCoins(); drawOrcs(); drawSoldiers(); drawPlayer(); drawParticles(); drawBossBar();
    }
  }
  ctx.restore();
}

// ── Menu background ──
function drawMenuBg() {
  var t = performance.now()/1000;
  var sky = ctx.createLinearGradient(0,0,0,CH*0.56);
  sky.addColorStop(0,'#0d1828'); sky.addColorStop(0.6,'#1e3a5e'); sky.addColorStop(1,'#2a4835');
  ctx.fillStyle = sky; ctx.fillRect(0,0,CW,CH*0.56);
  var stars = [[60,22],[140,14],[240,34],[375,19],[490,9],[598,28],[678,17],[748,41],[100,55],[310,58],[522,44],[662,61]];
  ctx.fillStyle = '#fff';
  for (var i = 0; i < stars.length; i++) { ctx.globalAlpha=0.28+0.58*Math.abs(Math.sin(t*1.3+i)); ctx.beginPath(); ctx.arc(stars[i][0],stars[i][1],1.2,0,Math.PI*2); ctx.fill(); }
  ctx.globalAlpha = 1;
  var gnd = ctx.createLinearGradient(0,CH*0.56,0,CH); gnd.addColorStop(0,'#d4aa74'); gnd.addColorStop(1,'#9a7240');
  ctx.fillStyle = gnd; ctx.fillRect(0,CH*0.56,CW,CH*0.44);
  ctx.fillStyle='rgba(90,55,15,0.4)'; ctx.beginPath(); ctx.ellipse(CW/2,CH*0.66,CW*0.44,30,0,0,Math.PI*2); ctx.fill();
  // Castle silhouette
  ctx.fillStyle='#2e3840'; ctx.fillRect(0,CH*0.36,130,CH*0.64);
  for (i=0;i<6;i++) { if(i%2===0) ctx.fillRect(i*22,CH*0.36-18,19,20); }
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(58,CH*0.56,18,Math.PI,0); ctx.lineTo(76,CH*0.56); ctx.lineTo(40,CH*0.56); ctx.closePath(); ctx.fill();
  // Village silhouette
  ctx.fillStyle='#28201a'; ctx.fillRect(CW-140,CH*0.48,60,CH*0.52);
  ctx.beginPath(); ctx.moveTo(CW-145,CH*0.48); ctx.lineTo(CW-110,CH*0.35); ctx.lineTo(CW-75,CH*0.48); ctx.closePath(); ctx.fill();
  ctx.fillRect(CW-70,CH*0.52,70,CH*0.48); ctx.beginPath(); ctx.moveTo(CW-75,CH*0.52); ctx.lineTo(CW-38,CH*0.38); ctx.lineTo(CW-3,CH*0.52); ctx.closePath(); ctx.fill();
  // Walking orcs
  for (i=0;i<3;i++) { var spd=38+i*14, ox=((t*spd+i*(CW/3))%(CW+80))-40; drawMenuOrc(ox,CH*0.60+i*16,t+i*2.1); }
}

function drawMenuOrc(x, y, t) {
  var leg = Math.sin(t*5)*5;
  ctx.globalAlpha=0.75; ctx.fillStyle='#2a7a2a';
  ctx.beginPath(); ctx.ellipse(x,y,9,7,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x,y-12,9,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ff2222'; ctx.beginPath(); ctx.arc(x-3,y-13,2.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+3,y-13,2.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fffde0'; ctx.fillRect(x-4,y-7,2.5,5); ctx.fillRect(x+2,y-7,2.5,5);
  ctx.fillStyle='#1a5a1a'; ctx.fillRect(x-6,y+5,4,8+leg); ctx.fillRect(x+2,y+5,4,8-leg);
  ctx.globalAlpha=1;
}

// ── Player (chibi knight) ──
function drawPlayer() {
  var p = gs.player;
  // Blink when invincible
  if (p.invTimer > 0 && Math.floor(p.invTimer/0.1)%2 === 0) return;
  ctx.save(); ctx.translate(p.x, p.y);
  var fr = Math.cos(p.angle) >= 0;
  if (!fr) ctx.scale(-1,1);
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.22)'; ctx.beginPath(); ctx.ellipse(0,15,14,5,0,0,Math.PI*2); ctx.fill();
  // Cape
  ctx.fillStyle='#cc2222'; ctx.beginPath(); ctx.ellipse(-4,5,9,13,0.18,0,Math.PI*2); ctx.fill();
  // Body
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(-12,-4,24,20);
  ctx.fillStyle='#8090a0'; ctx.fillRect(-10,-3,20,18);
  ctx.strokeStyle='#aabbd0'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(-6,0); ctx.lineTo(-6,12); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(6,0);  ctx.lineTo(6,12);  ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-9,6); ctx.lineTo(9,6);   ctx.stroke();
  // Shield (left)
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(-19,-2,11,15);
  ctx.fillStyle='#2244aa'; ctx.fillRect(-18,-1,9,13);
  ctx.fillStyle='#ffd700'; ctx.fillRect(-15,2,2,8); ctx.fillRect(-17,4,6,2);
  // Sword (right)
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(9,-1,22,7);
  ctx.fillStyle='#c8d8e8'; ctx.fillRect(11,0,20,5);
  ctx.fillStyle='#ffd700'; ctx.fillRect(9,-2,4,9);
  // Helmet
  ctx.fillStyle='#1a1a1a'; ctx.beginPath(); ctx.arc(0,-12,15,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#b0bcc8'; ctx.beginPath(); ctx.arc(0,-12,13,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#8898a8'; ctx.fillRect(-7,-13,14,9);
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(-6,-10,4,2); ctx.fillRect(2,-10,4,2);
  // Plume
  ctx.fillStyle='#cc2222'; ctx.fillRect(-2,-28,4,15);
  ctx.beginPath(); ctx.ellipse(0,-30,5,4,0,0,Math.PI*2); ctx.fill();
  // Legs (animated walk)
  var mv = !!(keys['KeyW']||keys['KeyS']||keys['KeyA']||keys['KeyD']||keys['ArrowUp']||keys['ArrowDown']||keys['ArrowLeft']||keys['ArrowRight']||keys._joyX||keys._joyY);
  var walk = mv ? Math.sin(performance.now()/1000*9)*4 : 0;
  ctx.fillStyle='#505870'; ctx.fillRect(-8,16,7,10+walk); ctx.fillRect(1,16,7,10-walk);
  ctx.fillStyle='#3a3a4a'; ctx.fillRect(-9,24+walk,9,5); ctx.fillRect(0,24-walk,9,5);
  ctx.restore();
}

// ── Orcs ──
function drawOrcs() {
  for (var i = 0; i < gs.orcs.length; i++) { if (!gs.orcs[i].dead) drawOrc(gs.orcs[i]); }
}

function drawOrc(orc) {
  var r = orc.r, leg = Math.sin(orc.legPhase)*3.5;
  ctx.save(); ctx.translate(orc.x, orc.y);
  if (orc.boss) ctx.scale(2.0,2.0);
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.22)'; ctx.beginPath(); ctx.ellipse(0,r+3,r*0.9,r*0.28,0,0,Math.PI*2); ctx.fill();
  // Legs
  ctx.fillStyle=orc.col2; ctx.fillRect(-7,r-2,5,9+leg); ctx.fillRect(2,r-2,5,9-leg);
  // Body
  ctx.fillStyle='#1a1a1a'; ctx.beginPath(); ctx.ellipse(0,r*0.2,r*0.76,r*0.65,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=orc.col2;  ctx.beginPath(); ctx.ellipse(0,r*0.2,r*0.65,r*0.55,0,0,Math.PI*2); ctx.fill();
  // Armour plate
  if (orc.type==='armoured') {
    ctx.fillStyle='#6688aa'; ctx.fillRect(-r*0.44,-r*0.08,r*0.88,r*0.64);
    ctx.strokeStyle='#99aacc'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(-r*0.28,0); ctx.lineTo(-r*0.28,r*0.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(r*0.28,0);  ctx.lineTo(r*0.28,r*0.5);  ctx.stroke();
  }
  // Head
  ctx.fillStyle='#1a1a1a'; ctx.beginPath(); ctx.arc(0,-r*0.38,r+1.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=orc.col;   ctx.beginPath(); ctx.arc(0,-r*0.38,r,0,Math.PI*2);     ctx.fill();
  // Boss crown
  if (orc.boss) {
    ctx.fillStyle='#ffd700'; ctx.fillRect(-r*0.78,-r*1.44,r*1.56,r*0.34);
    for (var ci=0; ci<5; ci++) ctx.fillRect(-r*0.68+ci*r*0.37,-r*1.68,r*0.2,r*0.28);
  }
  // Goblin ears
  if (orc.type==='goblin') { ctx.fillStyle=orc.col; ctx.fillRect(-r-4,-r*0.58,5,10); ctx.fillRect(r-1,-r*0.58,5,10); }
  // Eyes
  ctx.fillStyle='#fff'; ctx.fillRect(-r*0.48,-r*0.55,r*0.36,r*0.26); ctx.fillRect(r*0.12,-r*0.55,r*0.36,r*0.26);
  ctx.fillStyle=orc.boss?'#ff2200':'#ff2222'; ctx.fillRect(-r*0.38,-r*0.50,r*0.18,r*0.18); ctx.fillRect(r*0.20,-r*0.50,r*0.18,r*0.18);
  // Tusks
  ctx.fillStyle='#fffde0'; ctx.fillRect(-r*0.38,-r*0.06,r*0.17,r*0.36); ctx.fillRect(r*0.21,-r*0.06,r*0.17,r*0.36);
  // Weapon
  if (orc.type==='ranged') { ctx.fillStyle='#888'; ctx.beginPath(); ctx.arc(r+6,-r*0.2,5,0,Math.PI*2); ctx.fill(); }
  else if (orc.boss) { ctx.fillStyle='#777'; ctx.fillRect(r*0.6,-r*0.7,r*0.22,r*1.4); ctx.fillStyle='#aaa'; ctx.fillRect(r*0.46,-r*0.86,r*0.72,r*0.48); }
  else { ctx.fillStyle='#8b5520'; ctx.fillRect(r*0.62,-r*0.6,r*0.22,r*1.3); ctx.fillRect(r*0.42,-r*0.74,r*0.58,r*0.38); }
  ctx.restore();
  // HP bar (not under boss scale)
  if (!orc.boss) {
    var bw=r*2.6,bh=4,bx=orc.x-bw/2,by=orc.y-r*1.9-bh;
    ctx.fillStyle='#300'; ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle='#f44'; ctx.fillRect(bx,by,bw*Math.max(0,orc.hp/orc.maxHp),bh);
    ctx.strokeStyle='#000'; ctx.lineWidth=0.5; ctx.strokeRect(bx,by,bw,bh);
  }
}

// ── Soldiers ──
function drawSoldiers() {
  for (var i=0; i<gs.soldiers.length; i++) {
    var sol=gs.soldiers[i]; if(sol.dead) continue;
    ctx.save(); ctx.translate(sol.x,sol.y);
    ctx.fillStyle='rgba(0,0,0,0.18)'; ctx.beginPath(); ctx.ellipse(0,13,10,4,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#1a1a1a'; ctx.fillRect(-7,-2,14,16);
    ctx.fillStyle='#336633'; ctx.fillRect(-6,-1,12,14);
    ctx.fillStyle='#225522'; ctx.fillRect(-2,-1,4,14);
    ctx.fillStyle='#1a1a1a'; ctx.beginPath(); ctx.arc(0,-9,9,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#b0bcc8'; ctx.beginPath(); ctx.arc(0,-9,7.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#8b5520'; ctx.fillRect(9,-18,3,30);
    ctx.fillStyle='#ccc'; ctx.beginPath(); ctx.moveTo(8,-24); ctx.lineTo(11,-18); ctx.lineTo(14,-24); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
}

// ── Coins ──
function drawCoins() {
  var t = performance.now()/1000;
  for (var i=0; i<gs.coins.length; i++) {
    var coin=gs.coins[i], bob=Math.sin(t*5+coin.x*0.1)*2, spin=Math.cos(t*4+coin.x*0.2);
    ctx.save(); ctx.translate(coin.x,coin.y+bob); ctx.scale(spin,1);
    ctx.fillStyle='#1a1000'; ctx.beginPath(); ctx.arc(0,0,6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffd700'; ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffee88'; ctx.beginPath(); ctx.arc(-1,-1,2,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ── Attack arc visual ──
function drawArcs() {
  for (var i=0; i<gs.arcs.length; i++) {
    var arc=gs.arcs[i], alpha=(arc.life/arc.maxLife)*0.44;
    ctx.save(); ctx.globalAlpha=alpha; ctx.fillStyle='#88aaff';
    ctx.beginPath(); ctx.moveTo(arc.x,arc.y); ctx.arc(arc.x,arc.y,84,arc.angle-Math.PI/3,arc.angle+Math.PI/3); ctx.closePath(); ctx.fill();
    ctx.globalAlpha=alpha*1.6; ctx.strokeStyle='#bbccff'; ctx.lineWidth=2; ctx.stroke();
    ctx.restore();
  }
}

// ── Particles ──
function drawParticles() {
  ctx.save();
  for (var i=0; i<gs.particles.length; i++) {
    var pt=gs.particles[i], a=pt.life/pt.maxLife;
    if (pt.type==='dot') { ctx.globalAlpha=a; ctx.fillStyle=pt.col; ctx.beginPath(); ctx.arc(pt.x,pt.y,3,0,Math.PI*2); ctx.fill(); }
    else if (pt.type==='dmgNum') { ctx.globalAlpha=Math.min(1,a*2.2); ctx.font='bold 13px Georgia'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.strokeStyle='#000'; ctx.lineWidth=2.5; ctx.strokeText(pt.val,pt.x,pt.y); ctx.fillStyle=pt.col; ctx.fillText(pt.val,pt.x,pt.y); }
    else if (pt.type==='proj') { ctx.globalAlpha=Math.min(1,a*1.5); ctx.fillStyle='#888'; ctx.beginPath(); ctx.arc(pt.x,pt.y,4,0,Math.PI*2); ctx.fill(); }
  }
  ctx.globalAlpha=1; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.restore();
}

// ── Boss HP bar ──
function drawBossBar() {
  var boss=null;
  for (var i=0; i<gs.orcs.length; i++) { if(gs.orcs[i].boss&&!gs.orcs[i].dead){boss=gs.orcs[i];break;} }
  if (!boss) return;
  var bw=280,bh=16,bx=(CW-bw)/2,by=10;
  ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fillRect(bx-10,by-2,bw+20,bh+22);
  ctx.fillStyle='#ffd700'; ctx.font='bold 11px Georgia'; ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText('\u2694 BOSS \u2694',CW/2,by);
  ctx.fillStyle='#300'; ctx.fillRect(bx,by+14,bw,bh-2);
  var fg=ctx.createLinearGradient(bx,0,bx+bw,0);
  fg.addColorStop(0,'#aa0000'); fg.addColorStop(0.5,'#ff3333'); fg.addColorStop(1,'#ff8800');
  ctx.fillStyle=fg; ctx.fillRect(bx,by+14,bw*Math.max(0,boss.hp/boss.maxHp),bh-2);
  ctx.strokeStyle='#666'; ctx.lineWidth=1; ctx.strokeRect(bx,by+14,bw,bh-2);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

// ═══════════════════════════════════════════════
// INITIAL MENU RENDER
// ═══════════════════════════════════════════════
(function menuLoop(ts) {
  if (gs.state !== 'menu') return;
  gs.lastTime = ts;
  draw();
  requestAnimationFrame(menuLoop);
})(performance.now());
</script>
</body>
