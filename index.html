<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Knight Orc Assault</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Georgia', serif; overflow: hidden; }
#gameContainer { position: relative; }
canvas { display: block; }
#hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
#topLeft { position: absolute; top: 10px; left: 10px; color: #fff; text-shadow: 1px 1px 3px #000, 2px 2px 6px #000; }
#topLeft .score { font-size: 18px; font-weight: bold; }
#topLeft .wave { font-size: 14px; color: #ffd700; }
#bottomBar { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.78); padding: 8px 12px; display: flex; align-items: center; gap: 10px; pointer-events: all; border-top: 2px solid rgba(255,200,50,0.3); }
#barsSection { flex: 1; }
.bar-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.bar-label { color: #ccc; font-size: 11px; width: 28px; text-align: right; }
.bar-bg { flex: 1; height: 14px; background: #222; border-radius: 7px; overflow: hidden; border: 1px solid #555; position: relative; }
.bar-fill { height: 100%; border-radius: 7px; transition: width 0.15s; position: relative; }
#hpFill { background: linear-gradient(90deg, #a00, #f44, #ff6666); }
#xpFill { background: linear-gradient(90deg, #060, #2d2, #6f6); }
.bar-text { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; text-shadow: 1px 1px 2px #000; font-weight: bold; pointer-events: none; }
#levelLabel { color: #ffd700; font-size: 13px; font-weight: bold; white-space: nowrap; }
#regroupBtn { background: linear-gradient(180deg,#5c4,#384); color: #fff; border: 2px solid #6f5; padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; white-space: nowrap; pointer-events: all; font-weight: bold; text-shadow: 1px 1px 2px #000; }
#regroupBtn:hover { background: linear-gradient(180deg,#6d5,#495); }
#rightHud { display: flex; align-items: center; gap: 8px; }
#goldDisplay { color: #ffd700; font-size: 15px; font-weight: bold; text-shadow: 1px 1px 3px #000; }
#shopBtn { background: linear-gradient(180deg,#c96,#865); color: #fff; border: 2px solid #ffd700; padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; pointer-events: all; font-weight: bold; text-shadow: 1px 1px 2px #000; }
#shopBtn:hover { background: linear-gradient(180deg,#da7,#976); }
#waveAnnounce { position: absolute; top: 38%; left: 50%; transform: translate(-50%, -50%); color: #ffd700; font-size: 42px; font-weight: bold; text-shadow: 2px 2px 10px #000, 0 0 30px #f80; pointer-events: none; opacity: 0; text-align: center; white-space: nowrap; z-index: 50; }
#overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.88); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; z-index: 100; }
#overlay h1 { font-size: 42px; margin-bottom: 10px; color: #ffd700; text-shadow: 0 0 20px #f80, 2px 2px 6px #000; }
#overlay .subtitle { font-size: 18px; margin-bottom: 16px; color: #ccc; }
#overlay .controls-hint { color: #aaa; font-size: 13px; margin-bottom: 24px; text-align: center; line-height: 1.8; }
#overlay button { background: linear-gradient(180deg,#c96,#865); color: #fff; border: 3px solid #ffd700; padding: 12px 30px; font-size: 20px; border-radius: 10px; cursor: pointer; font-family: 'Georgia', serif; margin: 5px; text-shadow: 1px 1px 3px #000; }
#overlay button:hover { background: linear-gradient(180deg,#da7,#976); }
#shopOverlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(1.0); transform-origin: center center; transition: transform 0.18s cubic-bezier(.22,.68,0,1.2), opacity 0.18s; background: rgba(12,8,2,0.97); border: 3px solid #c96; border-radius: 14px; padding: 22px; min-width: 320px; max-width: 380px; color: #fff; z-index: 200; display: none; box-shadow: 0 0 30px rgba(200,150,50,0.4); }
#shopOverlay h2 { text-align: center; color: #ffd700; margin-bottom: 4px; font-size: 26px; text-shadow: 0 0 10px #f80; }
#shopOverlay .shopStats { text-align: center; color: #aaa; font-size: 12px; margin-bottom: 6px; }
#shopOverlay .goldInfo { text-align: center; color: #ffd700; margin-bottom: 14px; font-size: 15px; font-weight: bold; }
.shopItem { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; margin-bottom: 6px; background: rgba(255,255,255,0.05); border-radius: 6px; border: 1px solid #444; }
.shopItem.can-afford { border-color: #c8a020; box-shadow: 0 0 6px rgba(200,160,20,0.35); }
.shopItem .itemInfo { flex: 1; }
.shopItem .itemName { font-size: 13px; }
.shopItem .itemDesc { font-size: 10px; color: #888; margin-top: 1px; }
.shopItem .itemCost { color: #ffd700; font-size: 12px; margin: 0 10px; white-space: nowrap; }
.shopItem button { background: linear-gradient(180deg,#5c4,#384); border: 1px solid #6f5; color: #fff; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; white-space: nowrap; }
.shopItem button:hover:not(:disabled) { background: linear-gradient(180deg,#6d5,#495); }
.shopItem button:disabled { background: #333; color: #555; cursor: not-allowed; border-color: #333; }
#shopClose { display: block; width: 100%; margin-top: 12px; background: linear-gradient(180deg,#765,#543); color: #fff; border: 2px solid #c96; padding: 9px; border-radius: 8px; cursor: pointer; font-size: 15px; font-family: 'Georgia',serif; }
#shopClose:hover { background: linear-gradient(180deg,#876,#654); }
#waveCard { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.82); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 90; pointer-events: none; }
#waveCard .wc-title { font-size: 50px; color: #ffd700; font-weight: bold; text-shadow: 0 0 20px #f80, 2px 2px 8px #000; }
#waveCard .wc-next { font-size: 22px; color: #fff; margin-top: 10px; text-shadow: 1px 1px 4px #000; }
#waveCard .wc-stats { font-size: 16px; color: #aaa; margin-top: 8px; }
#touchControls { position: absolute; bottom: 60px; left: 0; width: 100%; display: none; pointer-events: none; }
#joystickArea { position: absolute; bottom: 5px; left: 20px; width: 110px; height: 110px; border-radius: 50%; background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.25); pointer-events: all; touch-action: none; }
#joystickThumb { position: absolute; width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.45); border: 2px solid rgba(255,255,255,0.8); top: 50%; left: 50%; transform: translate(-50%,-50%); pointer-events: none; }
#attackBtn { position: absolute; bottom: 10px; right: 30px; width: 76px; height: 76px; border-radius: 50%; background: rgba(200,50,50,0.5); border: 3px solid rgba(255,100,100,0.9); color: #fff; font-size: 13px; font-weight: bold; display: flex; align-items: center; justify-content: center; pointer-events: all; cursor: pointer; touch-action: none; user-select: none; text-shadow: 1px 1px 2px #000; }
#shopMobileBtn { position: absolute; top: 10px; right: 10px; background: linear-gradient(180deg,#c96,#865); color: #fff; border: 2px solid #ffd700; padding: 5px 10px; border-radius: 6px; font-size: 12px; pointer-events: all; cursor: pointer; display: none; }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div id="hud">
    <div id="topLeft">
      <div class="score">Score: <span id="scoreVal">0</span></div>
      <div class="wave">Wave <span id="waveVal">0</span>/50</div>
    </div>
    <div id="bottomBar">
      <button id="regroupBtn" onclick="regroupSoldiers()">REGROUP</button>
      <div id="barsSection">
        <div class="bar-row">
          <span class="bar-label">HP</span>
          <div class="bar-bg">
            <div class="bar-fill" id="hpFill" style="width:100%"></div>
            <div class="bar-text" id="hpText">100/100</div>
          </div>
        </div>
        <div class="bar-row">
          <span class="bar-label">XP</span>
          <div class="bar-bg">
            <div class="bar-fill" id="xpFill" style="width:0%"></div>
          </div>
          <span id="levelLabel">Lv 1</span>
        </div>
      </div>
      <div id="rightHud">
        <span id="goldDisplay">★ 0</span>
        <button id="shopBtn" onclick="openShop()">SHOP</button>
      </div>
    </div>
    <div id="waveAnnounce"></div>
    <div id="waveCard">
      <div class="wc-title" id="wcTitle"></div>
      <div class="wc-next" id="wcNext"></div>
      <div class="wc-stats" id="wcStats"></div>
    </div>
  </div>
  <div id="overlay">
    <h1>&#9876; KNIGHT ORC ASSAULT</h1>
    <div class="subtitle">Defend the village across 50 waves of orcs!</div>
    <div class="controls-hint">
      WASD / Arrow Keys: Move &nbsp;|&nbsp; Click / Space: Attack<br>
      E key or SHOP button: Open shop &nbsp;|&nbsp; Kill orcs to earn gold<br>
      Player faces movement direction &mdash; use joystick on mobile
    </div>
    <button onclick="startGame()">&#9658; START GAME</button>
  </div>
  <div id="shopOverlay">
    <h2>&#9876; SHOP</h2>
    <div class="shopStats" id="shopStats"></div>
    <div class="goldInfo">Gold: <span id="shopGold">0</span> &#9733;</div>
    <div id="shopItems"></div>
    <button id="shopClose" onclick="closeShop()">Continue to Next Wave &#8594;</button>
  </div>
  <div id="touchControls">
    <div id="joystickArea"><div id="joystickThumb"></div></div>
    <div id="attackBtn">ATK</div>
    <button id="shopMobileBtn" onclick="openShop()">SHOP</button>
  </div>
</div>

<script>
// ─── Canvas & World Setup ──────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const VW = 800, VH = 560;   // viewport
const WW = 1600, WH = 1100; // world
const WALL = 40;             // wall thickness
canvas.width = VW;
canvas.height = VH;
document.getElementById('gameContainer').style.width = VW + 'px';
document.getElementById('gameContainer').style.height = VH + 'px';

function scaleCanvas() {
  const s = Math.min(window.innerWidth / VW, window.innerHeight / VH, 1.5);
  const gc = document.getElementById('gameContainer');
  gc.style.transform = 'scale(' + s + ')';
  gc.style.transformOrigin = 'top center';
  if (window.innerWidth < 700) {
    document.getElementById('touchControls').style.display = 'block';
    document.getElementById('shopMobileBtn').style.display = 'block';
  }
}
scaleCanvas();
window.addEventListener('resize', scaleCanvas);

// ─── Audio ────────────────────────────────────────────────────────────────
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playSound(type, volMult) {
  try {
    const ac = getAudioCtx();
    const v = volMult || 1.0;
    const t = ac.currentTime;
    if (type === 'swing') {
      const osc = ac.createOscillator(), g = ac.createGain();
      osc.frequency.setValueAtTime(400, t); osc.frequency.exponentialRampToValueAtTime(200, t+0.1);
      g.gain.setValueAtTime(0.15*v, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.1);
      osc.connect(g); g.connect(ac.destination); osc.start(t); osc.stop(t+0.1);
      const bs = Math.ceil(ac.sampleRate*0.08), buf = ac.createBuffer(1, bs, ac.sampleRate);
      const bd = buf.getChannelData(0); for (let i=0;i<bs;i++) bd[i]=Math.random()*2-1;
      const ns = ac.createBufferSource(), ng = ac.createGain();
      ns.buffer = buf; ng.gain.setValueAtTime(0.1*v,t); ng.gain.exponentialRampToValueAtTime(0.001,t+0.08);
      ns.connect(ng); ng.connect(ac.destination); ns.start(t); ns.stop(t+0.08);
    } else if (type === 'orcHit') {
      const osc = ac.createOscillator(), g = ac.createGain();
      osc.type='sine'; osc.frequency.setValueAtTime(120,t); osc.frequency.exponentialRampToValueAtTime(60,t+0.08);
      g.gain.setValueAtTime(0.3*v,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.08);
      osc.connect(g); g.connect(ac.destination); osc.start(t); osc.stop(t+0.08);
    } else if (type === 'orcDeath') {
      const osc = ac.createOscillator(), g = ac.createGain();
      osc.frequency.setValueAtTime(200,t); osc.frequency.exponentialRampToValueAtTime(50,t+0.15);
      g.gain.setValueAtTime(0.25*v,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
      osc.connect(g); g.connect(ac.destination); osc.start(t); osc.stop(t+0.15);
    } else if (type === 'coin') {
      const osc = ac.createOscillator(), g = ac.createGain();
      osc.type='sine'; osc.frequency.setValueAtTime(880,t); osc.frequency.exponentialRampToValueAtTime(1200,t+0.03);
      g.gain.setValueAtTime(0.15*v,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.06);
      osc.connect(g); g.connect(ac.destination); osc.start(t); osc.stop(t+0.06);
    } else if (type === 'levelUp') {
      [261.63,329.63,392.00].forEach((freq,i) => {
        const osc=ac.createOscillator(), g=ac.createGain();
        osc.type='sine'; osc.frequency.setValueAtTime(freq,t+i*0.15);
        g.gain.setValueAtTime(0,t+i*0.15); g.gain.linearRampToValueAtTime(0.2*v,t+i*0.15+0.01); g.gain.exponentialRampToValueAtTime(0.001,t+i*0.15+0.15);
        osc.connect(g); g.connect(ac.destination); osc.start(t+i*0.15); osc.stop(t+i*0.15+0.15);
      });
    } else if (type === 'playerHurt') {
      const osc = ac.createOscillator(), g = ac.createGain();
      osc.type='sawtooth'; osc.frequency.setValueAtTime(150,t); osc.frequency.exponentialRampToValueAtTime(80,t+0.2);
      g.gain.setValueAtTime(0.2*v,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
      osc.connect(g); g.connect(ac.destination); osc.start(t); osc.stop(t+0.2);
    } else if (type === 'waveComplete') {
      [[659.25,0],[783.99,0.3]].forEach(([freq,delay]) => {
        const osc=ac.createOscillator(), g=ac.createGain();
        osc.type='sine'; osc.frequency.setValueAtTime(freq,t+delay);
        g.gain.setValueAtTime(0.25*v,t+delay); g.gain.exponentialRampToValueAtTime(0.001,t+delay+0.3);
        osc.connect(g); g.connect(ac.destination); osc.start(t+delay); osc.stop(t+delay+0.3);
      });
    } else if (type === 'bossSpawn') {
      const osc = ac.createOscillator(), g = ac.createGain();
      osc.type='sine'; osc.frequency.setValueAtTime(60,t);
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.3*v,t+0.1); g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
      osc.connect(g); g.connect(ac.destination); osc.start(t); osc.stop(t+0.4);
    }
  } catch(e) {}
}

// ─── Camera ────────────────────────────────────────────────────────────────
const cam = { x: WW/2 - VW/2, y: WH/2 - VH/2 };
const shake = { x: 0, y: 0, timer: 0, mag: 0 };

function updateCamera(player, dt) {
  const tx = player.x - VW/2;
  const ty = player.y - VH/2;
  cam.x += (tx - cam.x) * 0.08;
  cam.y += (ty - cam.y) * 0.08;
  cam.x = Math.max(0, Math.min(WW - VW, cam.x));
  cam.y = Math.max(0, Math.min(WH - VH, cam.y));
  // screen shake
  if (shake.timer > 0) {
    shake.timer -= dt;
    shake.x = (Math.random() - 0.5) * 2 * shake.mag;
    shake.y = (Math.random() - 0.5) * 2 * shake.mag;
  } else {
    shake.x = 0; shake.y = 0;
  }
  // zoom pulse
  if (camZoomTimer > 0) {
    camZoomTimer -= dt;
    if (camZoomTimer <= 0) camZoomTarget = 1.0;
  }
  camZoom += (camZoomTarget - camZoom) * Math.min(1, dt * 14);
}

function triggerShake(mag, duration) {
  shake.mag = mag; shake.timer = duration;
}

let camZoom = 1.0, camZoomTarget = 1.0, camZoomTimer = 0;
function triggerZoomPulse() {
  camZoomTarget = 1.03; camZoomTimer = 0.15;
}

// world->screen
function wx(x) { return x - cam.x + shake.x; }
function wy(y) { return y - cam.y + shake.y; }

// ─── Input ─────────────────────────────────────────────────────────────────
const keys = {};
const joystick = { active: false, dx: 0, dy: 0 };

window.addEventListener('keydown', function(e) {
  getAudioCtx();
  keys[e.code] = true;
  if (e.code === 'Space') { e.preventDefault(); tryAttack(); }
  if (e.code === 'KeyE') { e.preventDefault(); openShop(); }
});
window.addEventListener('keyup', function(e) { keys[e.code] = false; });

canvas.addEventListener('mousedown', function(e) {
  getAudioCtx();
  if (e.button === 0) tryAttack();
});
canvas.addEventListener('contextmenu', function(e) { e.preventDefault(); });

// Touch joystick
const joystickArea = document.getElementById('joystickArea');
const joystickThumb = document.getElementById('joystickThumb');
let joyOrigin = null;

joystickArea.addEventListener('touchstart', function(e) {
  getAudioCtx();
  e.preventDefault();
  const r = joystickArea.getBoundingClientRect();
  joyOrigin = { x: r.left + r.width/2, y: r.top + r.height/2 };
  joystick.active = true;
}, { passive: false });
joystickArea.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (!joyOrigin) return;
  const t = e.touches[0];
  const dx = t.clientX - joyOrigin.x, dy = t.clientY - joyOrigin.y;
  const dist = Math.sqrt(dx*dx + dy*dy), maxD = 38;
  const cx = Math.min(dist, maxD) * (dist > 0 ? dx/dist : 0);
  const cy = Math.min(dist, maxD) * (dist > 0 ? dy/dist : 0);
  joystickThumb.style.transform = `translate(calc(-50% + ${cx}px), calc(-50% + ${cy}px))`;
  joystick.dx = cx / maxD; joystick.dy = cy / maxD;
}, { passive: false });
joystickArea.addEventListener('touchend', function(e) {
  e.preventDefault();
  joystick.active = false; joystick.dx = 0; joystick.dy = 0;
  joystickThumb.style.transform = 'translate(-50%,-50%)';
}, { passive: false });

document.getElementById('attackBtn').addEventListener('touchstart', function(e) {
  getAudioCtx();
  e.preventDefault(); tryAttack();
}, { passive: false });

// ─── Game State ────────────────────────────────────────────────────────────
let gs = {};
let waveKills = 0, waveGold = 0;

function initGameState() {
  gs = {
    state: 'menu',
    score: 0, wave: 0, gold: 0,
    player: null,
    soldiers: [], orcs: [], projectiles: [],
    coins: [], particles: [], dmgNums: [],
    shopOpen: false,
    attackSpeedLevel: 0,
    killStreak: 0, comboTimer: 0,
    comboTexts: [], sparkles: [], killFeed: [],
    dtMult: 1.0, deathSlowTimer: 0,
    hordeWave: false,
  };
  gs.player = {
    x: WW/2, y: WH/2,
    hp: 100, maxHp: 100,
    damage: 25, speed: 160,
    xp: 0, xpNext: 100,
    level: 1,
    angle: 0,
    attackCooldown: 0, attackAnim: 0,
    invincible: 0,
    r: 16,
    deathFlash: 0,
  };
  cam.x = WW/2 - VW/2;
  cam.y = WH/2 - VH/2;
}
initGameState();

// ─── Drawing: Player (Chibi Knight) ───────────────────────────────────────
function drawPlayer(p) {
  const x = wx(p.x), y = wy(p.y);
  if (!isOnScreen(p.x, p.y, 40)) return;

  // death flash
  if (gs.state === 'dying') {
    if (Math.floor(gs.deathSlowTimer * 15) % 2 === 0) {
      ctx.save(); ctx.translate(wx(p.x), wy(p.y));
      ctx.fillStyle = 'rgba(220,0,0,0.85)';
      ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      return;
    }
  } else {
    if (p.invincible > 0 && Math.floor(p.invincible * 10) % 2 === 0) return;
  }

  ctx.save();
  ctx.translate(x, y);

  const a = p.angle;
  // sword direction
  ctx.save();
  ctx.rotate(a);
  // outline sword
  ctx.fillStyle = '#333';
  ctx.fillRect(6, -3, 32, 6);
  // sword blade
  ctx.fillStyle = '#d0d8e0';
  ctx.fillRect(7, -2, 30, 4);
  // hilt
  ctx.fillStyle = '#8a6020';
  ctx.fillRect(4, -4, 6, 8);
  ctx.restore();

  // red cape (behind body)
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.ellipse(-2, 4, 11, 14, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#cc2020';
  ctx.beginPath(); ctx.ellipse(-2, 4, 9, 12, 0, 0, Math.PI*2); ctx.fill();

  // body outline
  ctx.fillStyle = '#333';
  ctx.fillRect(-11, -2, 22, 24);
  // body
  ctx.fillStyle = '#8898a8';
  ctx.fillRect(-10, -1, 20, 22);
  // belt
  ctx.fillStyle = '#5a4020';
  ctx.fillRect(-10, 17, 20, 4);

  // legs outline
  ctx.fillStyle = '#333';
  ctx.fillRect(-10, 20, 9, 11);
  ctx.fillRect(2, 20, 9, 11);
  // legs
  ctx.fillStyle = '#6878a0';
  ctx.fillRect(-9, 21, 7, 9);
  ctx.fillRect(3, 21, 7, 9);
  // boots
  ctx.fillStyle = '#3a3020';
  ctx.fillRect(-9, 27, 8, 4);
  ctx.fillRect(3, 27, 8, 4);

  // helmet outline
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(0, -10, 16, 0, Math.PI*2); ctx.fill();
  // helmet
  ctx.fillStyle = '#b0bcc8';
  ctx.beginPath(); ctx.arc(0, -10, 14, 0, Math.PI*2); ctx.fill();
  // helmet visor
  ctx.fillStyle = '#444';
  ctx.fillRect(-7, -8, 14, 5);
  ctx.fillStyle = '#c0ccd8';
  ctx.fillRect(-6, -7, 12, 3);
  // face slot
  ctx.fillStyle = '#222';
  ctx.fillRect(-5, -14, 10, 6);
  // eyes in visor gap
  ctx.fillStyle = '#88aacc';
  ctx.fillRect(-4, -13, 3, 4);
  ctx.fillRect(2, -13, 3, 4);

  // red plume
  ctx.fillStyle = '#333';
  ctx.fillRect(-2, -26, 5, 16);
  ctx.fillStyle = '#dd1010';
  ctx.fillRect(-1, -25, 3, 14);

  // attack flash
  if (p.attackAnim > 0) {
    ctx.globalAlpha = p.attackAnim * 0.5;
    ctx.fillStyle = '#ffffaa';
    ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// ─── Drawing: Orc ──────────────────────────────────────────────────────────
function drawOrc(o) {
  if (!isOnScreen(o.x, o.y, 40)) return;
  const x = wx(o.x), y = wy(o.y);
  const sc = o.boss ? 2.2 : (o.type === 'goblin' ? 0.75 : 1);
  const flash = o.hitFlash > 0;
  const rage = o.boss && o.hp < o.maxHp * 0.5;

  ctx.save();
  ctx.translate(x, y);
  ctx.scale(sc, sc);

  if (flash) { ctx.filter = 'brightness(5) saturate(0)'; }

  // rage particles
  if (rage && Math.random() < 0.3) {
    // just darken
  }

  const headColor = o.boss ? '#1a7a1a' : (o.type === 'goblin' ? '#55ee55' : (o.type === 'armoured' ? '#5588aa' : '#44cc44'));
  const bodyColor = o.boss ? '#145a14' : (o.type === 'armoured' ? '#3a6688' : '#2a8a2a');

  // --- body outline
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.ellipse(0, 12, 11, 8, 0, 0, Math.PI*2); ctx.fill();
  // body
  ctx.fillStyle = bodyColor;
  ctx.beginPath(); ctx.ellipse(0, 12, 9, 6, 0, 0, Math.PI*2); ctx.fill();

  if (o.type === 'armoured') {
    ctx.fillStyle = '#889aaa';
    ctx.fillRect(-7, 5, 14, 12);
    ctx.fillStyle = '#aabbcc';
    ctx.fillRect(-6, 6, 12, 3);
  }

  // --- legs
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(-7, 17, 6, 8);
  ctx.fillRect(2, 17, 6, 8);
  ctx.fillStyle = bodyColor;
  ctx.fillRect(-6, 18, 4, 6);
  ctx.fillRect(3, 18, 4, 6);

  // --- head outline
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(0, -5, 15, 0, Math.PI*2); ctx.fill();
  // head
  ctx.fillStyle = headColor;
  ctx.beginPath(); ctx.arc(0, -5, 13, 0, Math.PI*2); ctx.fill();

  if (o.type === 'goblin') {
    // pointy ears
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.moveTo(-12,-2); ctx.lineTo(-18,-10); ctx.lineTo(-7,-8); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(12,-2); ctx.lineTo(18,-10); ctx.lineTo(7,-8); ctx.closePath(); ctx.fill();
    ctx.fillStyle = headColor;
    ctx.beginPath(); ctx.moveTo(-11,-3); ctx.lineTo(-16,-9); ctx.lineTo(-8,-8); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(11,-3); ctx.lineTo(16,-9); ctx.lineTo(8,-8); ctx.closePath(); ctx.fill();
  }

  // boss crown
  if (o.boss) {
    ctx.fillStyle = '#ffd700';
    ctx.fillRect(-10, -20, 6, 6);
    ctx.fillRect(-2, -22, 5, 8);
    ctx.fillRect(5, -20, 6, 6);
  }

  // eyes
  const eyeColor = o.boss ? '#ff2020' : '#ff4444';
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-5, -7, 4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5, -7, 4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = eyeColor;
  ctx.beginPath(); ctx.arc(-5, -7, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5, -7, 3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-4, -8, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(6, -8, 1.5, 0, Math.PI*2); ctx.fill();

  // nose
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(-2, -3, 5, 4);

  // tusks
  ctx.fillStyle = '#fffde0';
  ctx.fillRect(-5, 2, 3, 6);
  ctx.fillRect(3, 2, 3, 6);

  // weapon
  if (o.type === 'ranged') {
    // rock
    ctx.fillStyle = '#888';
    ctx.beginPath(); ctx.arc(14, 0, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#aaa';
    ctx.beginPath(); ctx.arc(13, -1, 2, 0, Math.PI*2); ctx.fill();
  } else if (o.boss) {
    // axe
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(10, -20, 5, 36);
    ctx.fillStyle = '#888';
    ctx.fillRect(10, -20, 5, 32);
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.moveTo(15,-18); ctx.lineTo(26,-14); ctx.lineTo(24,2); ctx.lineTo(15,0); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#aaa';
    ctx.beginPath(); ctx.moveTo(14,-17); ctx.lineTo(24,-13); ctx.lineTo(22,1); ctx.lineTo(14,-1); ctx.closePath(); ctx.fill();
  } else {
    // club
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(10, -4, 5, 20);
    ctx.fillStyle = '#8b5520';
    ctx.fillRect(11, -3, 3, 18);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(8, -8, 10, 8);
    ctx.fillStyle = '#6b3510';
    ctx.fillRect(9, -7, 8, 6);
  }

  ctx.restore();
  ctx.filter = 'none';

  // HP bar
  if (!o.boss) {
    const bw = 28 * sc;
    const bh = 4;
    const bx = wx(o.x) - bw/2, by = wy(o.y) - (15 * sc + 6);
    ctx.fillStyle = '#400';
    ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle = '#f44';
    ctx.fillRect(bx, by, bw * (o.hp / o.maxHp), bh);
  } else {
    const bw = 60;
    const bx = wx(o.x) - bw/2, by = wy(o.y) - 38;
    ctx.fillStyle = '#400';
    ctx.fillRect(bx, by, bw, 6);
    ctx.fillStyle = '#f44';
    ctx.fillRect(bx, by, bw * (o.hp / o.maxHp), 6);
    ctx.strokeStyle = '#800';
    ctx.lineWidth = 1;
    ctx.strokeRect(bx, by, bw, 6);
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 11px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText('BOSS', wx(o.x), by - 2);
  }
}

// ─── Drawing: Projectile ──────────────────────────────────────────────────
function drawProjectile(p) {
  if (!isOnScreen(p.x, p.y, 20)) return;
  const x = wx(p.x), y = wy(p.y);
  // motion trail
  for (let i = 3; i >= 1; i--) {
    ctx.globalAlpha = 0.1 * i;
    ctx.fillStyle = '#888';
    ctx.beginPath();
    ctx.arc(x - p.vx * 0.016 * i, y - p.vy * 0.016 * i, p.r * 0.7, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#555';
  ctx.beginPath(); ctx.arc(x, y, p.r, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#888';
  ctx.beginPath(); ctx.arc(x - 1, y - 1, p.r * 0.5, 0, Math.PI*2); ctx.fill();
}

function drawWorld() {

    [300,200],[420,300],[700,150],[900,200],[1100,350],[1300,250],

}

  ctx.strokeStyle = '#9a9a9a';
  ctx.lineWidth = 1;
  for (let row = 0; row < 11; row++) {
    const oy = row * 20;
    const offset = (row % 2) * 10;
    for (let col = 0; col < 2; col++) {
      ctx.strokeRect(wx(cx+30 + col*11 + offset), wy(300 + oy), 11, 20);
    }
  }
  // Battlements
  ctx.fillStyle = '#888';
  for (let i = 0; i < 4; i++) {

      ctx.fillRect(wx(bx), wy(295), 5, 10);

  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 1;
  for (let row = 0; row < 6; row++) {
    const oy = row * 18;

    for (let col = 0; col < 3; col++) {
      ctx.strokeRect(wx(cx+5 + col*18 + offset), wy(250 + oy), 18, 18);

  }
  // Tower battlements
  ctx.fillStyle = '#909090';

  ctx.lineTo(wx(cx+21), wy(310));

  ctx.fill();

function drawHouse(hx, hy, hw, hh) {
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.ellipse(wx(hx + hw/2), wy(hy + hh + 5), hw*0.6, 8, 0, 0, Math.PI*2); ctx.fill();

  // Body
  ctx.fillStyle = '#c09060';
  ctx.strokeStyle = '#8a6030';
  ctx.lineWidth = 2;
  ctx.fillRect(wx(hx), wy(hy), hw, hh);
  ctx.strokeRect(wx(hx), wy(hy), hw, hh);

  // Roof (triangle)
  ctx.fillStyle = '#7a3a08';
  ctx.strokeStyle = '#5a2a04';
  ctx.beginPath();
  ctx.moveTo(wx(hx - 8), wy(hy));
  ctx.lineTo(wx(hx + hw/2), wy(hy - 40));
  ctx.lineTo(wx(hx + hw + 8), wy(hy));

  // Window
  ctx.fillStyle = '#a8d8f0';
  ctx.fillRect(wx(hx + hw*0.15), wy(hy + hh*0.2), hw*0.3, hh*0.3);
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 2;
  ctx.strokeRect(wx(hx + hw*0.15), wy(hy + hh*0.2), hw*0.3, hh*0.3);
  // Window cross
  ctx.beginPath();
  ctx.moveTo(wx(hx + hw*0.15 + hw*0.15), wy(hy + hh*0.2));
  ctx.lineTo(wx(hx + hw*0.15 + hw*0.15), wy(hy + hh*0.2 + hh*0.3));
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(wx(hx + hw*0.15), wy(hy + hh*0.2 + hh*0.15));
  ctx.lineTo(wx(hx + hw*0.15 + hw*0.3), wy(hy + hh*0.2 + hh*0.15));
  ctx.stroke();

  // Door
  ctx.fillStyle = '#5a3010';
  const dw = hw*0.2, dh = hh*0.4;

  ctx.lineWidth = 1;
  ctx.strokeRect(wx(hx + hw*0.6), wy(hy + hh - dh), dw, dh);

  ctx.fillStyle = '#ffd700';
  ctx.beginPath(); ctx.arc(wx(hx + hw*0.6 + dw*0.75), wy(hy + hh - dh*0.5), 2, 0, Math.PI*2); ctx.fill();
}

function drawWalls() {
  ctx.fillStyle = '#606468';
  // Top
  ctx.fillRect(wx(0), wy(0), WW, WALL);
  // Bottom
  ctx.fillRect(wx(0), wy(WH - WALL), WW, WALL);
  // Left
  ctx.fillRect(wx(0), wy(0), WALL, WH);
  // Right
  ctx.fillRect(wx(WW - WALL), wy(0), WALL, WH);

  // Brick lines
  ctx.strokeStyle = '#484c50';
  ctx.lineWidth = 1;
  // Horizontal mortar lines
  const brickH = 18;
  for (let row = 0; row * brickH < WW; row++) {
    const oy = row * brickH;
    if (oy < WALL) {
      ctx.beginPath(); ctx.moveTo(wx(0), wy(oy)); ctx.lineTo(wx(WW), wy(oy)); ctx.stroke();
    }
    if (oy < WALL) {
      ctx.beginPath(); ctx.moveTo(wx(0), wy(WH - WALL + oy)); ctx.lineTo(wx(WW), wy(WH - WALL + oy)); ctx.stroke();
    }
  }
  for (let row = 0; row * brickH < WH; row++) {
    const oy = row * brickH;
    if (oy < WALL) {
      // left/right vertical mortar
    }
  }
  // Vertical brick joints (top/bottom wall)
  const brickW = 36;
  for (let col = 0; col * brickW < WW; col++) {
    const ox = col * brickW;
    // offset every other row
    ctx.beginPath(); ctx.moveTo(wx(ox), wy(0)); ctx.lineTo(wx(ox), wy(WALL)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(wx(ox + brickW/2), wy(brickH)); ctx.lineTo(wx(ox + brickW/2), wy(WALL)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(wx(ox), wy(WH - WALL)); ctx.lineTo(wx(ox), wy(WH)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(wx(ox + brickW/2), wy(WH - WALL + brickH)); ctx.lineTo(wx(ox + brickW/2), wy(WH)); ctx.stroke();
  }
  // Vertical brick joints (left/right wall)
  for (let row = 0; row * brickW < WH; row++) {
    const oy = row * brickW;
    ctx.beginPath(); ctx.moveTo(wx(0), wy(oy)); ctx.lineTo(wx(WALL), wy(oy)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(wx(WW - WALL), wy(oy)); ctx.lineTo(wx(WW), wy(oy)); ctx.stroke();
  }

  // slight highlight edge
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 2;
  ctx.strokeRect(wx(WALL), wy(WALL), WW - WALL*2, WH - WALL*2);
}

// ─── Particles & Damage Numbers ───────────────────────────────────────────
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 60 + Math.random() * 100;
    gs.particles.push({
      x, y,
      vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
      r: 2 + Math.random() * 3,
      color,
      life: 0.5 + Math.random() * 0.3,
      maxLife: 0.5 + Math.random() * 0.3,
    });
  }
}

function spawnDmgNum(x, y, val, color) {
  gs.dmgNums.push({ x, y, val, color: color||'#ff4', vy: -60, life: 1.0 });
}

function updateParticles(dt) {
  for (let i = gs.particles.length - 1; i >= 0; i--) {
    const p = gs.particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 120 * dt;
    p.life -= dt;
    if (p.life <= 0) gs.particles.splice(i, 1);
  }
  for (let i = gs.dmgNums.length - 1; i >= 0; i--) {
    const d = gs.dmgNums[i];
    d.y += d.vy * dt; d.vy *= 0.94;
    d.life -= dt;
    if (d.life <= 0) gs.dmgNums.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of gs.particles) {
    if (!isOnScreen(p.x, p.y, 10)) continue;
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(wx(p.x), wy(p.y), p.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  for (const d of gs.dmgNums) {
    if (!isOnScreen(d.x, d.y, 30)) continue;
    ctx.globalAlpha = Math.min(1, d.life * 2);
    ctx.fillStyle = d.color;
    ctx.font = 'bold 14px Georgia';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(d.val, wx(d.x), wy(d.y));
  }
  ctx.globalAlpha = 1;
}

// ─── Combo Texts ──────────────────────────────────────────────────────────
function spawnComboText(x, y, text) {
  gs.comboTexts.push({ x, y, text, life: 1.0, maxLife: 1.0, scale: 1.5 });
}
function updateComboTexts(dt) {
  for (let i = gs.comboTexts.length-1; i>=0; i--) {
    const c = gs.comboTexts[i];
    c.y -= 30 * dt;
    c.life -= dt;
    c.scale = Math.max(1.0, c.scale - dt * 4);
    if (c.life <= 0) gs.comboTexts.splice(i, 1);
  }
}
function drawComboTexts() {
  for (const c of gs.comboTexts) {
    const alpha = Math.min(1, c.life * 2);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(wx(c.x), wy(c.y));
    ctx.scale(c.scale, c.scale);
    ctx.fillStyle = '#ffd700';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.font = 'bold 18px Georgia';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeText(c.text, 0, 0);
    ctx.fillText(c.text, 0, 0);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

// ─── Sparkles ─────────────────────────────────────────────────────────────
function spawnSparkles() {
  for (let i = 0; i < 30; i++) {
    gs.sparkles.push({
      x: Math.random() * VW, y: Math.random() * VH,
      life: 0.4 + Math.random() * 0.4, maxLife: 0.8,
      r: 1 + Math.random() * 2,
    });
  }
}
function updateSparkles(dt) {
  for (let i = gs.sparkles.length-1; i>=0; i--) {
    gs.sparkles[i].life -= dt;
    if (gs.sparkles[i].life <= 0) gs.sparkles.splice(i, 1);
  }
}
function drawSparkles() {
  for (const s of gs.sparkles) {
    ctx.globalAlpha = s.life / s.maxLife;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ─── Kill Feed ────────────────────────────────────────────────────────────
function addKillFeed(text) {
  gs.killFeed.unshift({ text, timer: 2.0, x: VW + 10 });
  if (gs.killFeed.length > 3) gs.killFeed.pop();
}
function updateKillFeed(dt) {
  for (let i = gs.killFeed.length-1; i>=0; i--) {
    const kf = gs.killFeed[i];
    kf.timer -= dt;
    kf.x += (VW - 14 - kf.x) * Math.min(1, dt * 12); // slide in
    if (kf.timer <= 0) gs.killFeed.splice(i, 1);
  }
}
function drawKillFeed() {
  if (gs.shopOpen) return;
  const startY = 100; // below minimap
  ctx.font = 'bold 11px Georgia';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (let i = 0; i < gs.killFeed.length; i++) {
    const kf = gs.killFeed[i];
    const alpha = Math.min(1, kf.timer * 2);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    const tw = ctx.measureText(kf.text).width;
    ctx.fillRect(kf.x - tw - 8, startY + i * 16 - 7, tw + 10, 14);
    ctx.fillStyle = kf.text.includes('BOSS') ? '#ffd700' : '#ffaa44';
    ctx.fillText(kf.text, kf.x, startY + i * 16);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

// ─── Minimap ──────────────────────────────────────────────────────────────
function drawMinimap() {
  if (gs.shopOpen) return;
  const MW = 120, MH = 80;
  const MX = VW - MW - 6, MY = 8;
  // bg
  ctx.save();
  ctx.globalAlpha = 0.75;
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.roundRect ? ctx.roundRect(MX, MY, MW, MH, 4) : ctx.rect(MX, MY, MW, MH);
  ctx.fill();
  ctx.globalAlpha = 1;
  // world border
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1;
  ctx.strokeRect(MX, MY, MW, MH);
  // map entities
  function mmx(wx_) { return MX + (wx_ / WW) * MW; }
  function mmy(wy_) { return MY + (wy_ / WH) * MH; }
  // orcs
  ctx.fillStyle = '#f44';
  for (const o of gs.orcs) {
    ctx.beginPath(); ctx.arc(mmx(o.x), mmy(o.y), o.boss ? 2.5 : 1.5, 0, Math.PI*2); ctx.fill();
  }
  // coins
  ctx.fillStyle = '#ffd700';
  for (const c of gs.coins) {
    ctx.beginPath(); ctx.arc(mmx(c.x), mmy(c.y), 1, 0, Math.PI*2); ctx.fill();
  }
  // soldiers
  ctx.fillStyle = '#44aaff';
  for (const s of gs.soldiers) {
    ctx.beginPath(); ctx.arc(mmx(s.x), mmy(s.y), 2, 0, Math.PI*2); ctx.fill();
  }
  // player
  ctx.fillStyle = '#00ff88';
  const p = gs.player;
  ctx.beginPath(); ctx.arc(mmx(p.x), mmy(p.y), 3, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

// ─── Coin ──────────────────────────────────────────────────────────────────
function drawCoins() {
  for (const c of gs.coins) {
    if (!isOnScreen(c.x, c.y, 20)) continue;
    ctx.fillStyle = '#ffd700';
    ctx.strokeStyle = '#a07000';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(wx(c.x), wy(c.y), 6, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#ffe860';
    ctx.beginPath(); ctx.arc(wx(c.x)-1, wy(c.y)-1, 3, 0, Math.PI*2); ctx.fill();
  }
}

// ─── Helpers ───────────────────────────────────────────────────────────────
function isOnScreen(wx_, wy_, margin) {
  const sx = wx_ - cam.x, sy = wy_ - cam.y;
  return sx > -margin && sx < VW + margin && sy > -margin && sy < VH + margin;
}

function dist(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y;
  return Math.sqrt(dx*dx + dy*dy);
}

function clampPlayer(p) {
  const minX = WALL + p.r, maxX = WW - WALL - p.r;
  const minY = WALL + p.r, maxY = WH - WALL - p.r;
  p.x = Math.max(minX, Math.min(maxX, p.x));
  p.y = Math.max(minY, Math.min(maxY, p.y));
}

// ─── Attack ────────────────────────────────────────────────────────────────
function tryAttack() {
  if (gs.state !== 'playing') return;
  const p = gs.player;
  const cooldown = Math.max(0.32, 0.7 - gs.attackSpeedLevel * 0.13);
  if (p.attackCooldown > 0) return;
  p.attackCooldown = cooldown;
  p.attackAnim = 0.25;
  playSound('swing'); triggerZoomPulse();

  // Attack range in facing direction
  const ax = p.x + Math.cos(p.angle) * 28;
  const ay = p.y + Math.sin(p.angle) * 28;
  const range = 52;

  for (const o of gs.orcs) {
    const d = dist({ x: ax, y: ay }, o);
    if (d < range + o.r) {
      let dmg = p.damage;
      if (o.type === 'armoured') dmg = Math.round(dmg * 0.6);
      o.hp -= dmg;
      o.hitFlash = 0.12;
      // Knockback
      const kdx = o.x - p.x, kdy = o.y - p.y;
      const klen = Math.sqrt(kdx*kdx + kdy*kdy) || 1;
      o.kbVx = (kdx / klen) * 180;
      o.kbVy = (kdy / klen) * 180;
      o.kbTimer = 0.3;
      o.kbGrace = 0.15;
      spawnParticles(o.x, o.y, '#44cc44', 4);
      spawnParticles(o.x, o.y, '#998877', 4); // dust
      playSound('orcHit');
      spawnDmgNum(o.x, o.y - o.r - 10, dmg, '#ff4');

      if (o.hp <= 0) {
        killOrc(o);
      }
    }
  }

  for (const s of gs.soldiers) {
    // soldiers don't get hit by player
  }
}

function killOrc(o) {
  const goldBase = o.boss ? 20 : (o.type === 'armoured' ? 8 : (o.type === 'goblin' ? 3 : 5));
  const xpVal = o.boss ? 50 : (o.type === 'armoured' ? 12 : 5);
  // combo multiplier
  gs.killStreak++;
  gs.comboTimer = 2.5;
  let comboMult = 1;
  if (gs.killStreak >= 8) comboMult = 3;
  else if (gs.killStreak >= 5) comboMult = 2;
  else if (gs.killStreak >= 3) comboMult = 1.5;
  const goldVal = Math.round(goldBase * comboMult);
  gs.gold += goldVal;
  waveGold += goldVal;
  gs.score += o.boss ? 200 : 50;
  waveKills++;
  gs.player.xp += xpVal;
  gs.coins.push({ x: o.x, y: o.y, r: 6, val: goldVal });
  spawnParticles(o.x, o.y, '#44cc44', 12);
  spawnDmgNum(o.x, o.y - 20, '+' + goldVal + 'g', '#ffd700');
  playSound('orcDeath');
  // kill feed
  const feedText = (o.boss ? 'BOSS' : (o.type === 'goblin' ? 'Goblin' : (o.type === 'armoured' ? 'Armoured Orc' : (o.type === 'ranged' ? 'Ranged Orc' : 'Orc')))) + ' slain +' + goldVal + 'g';
  addKillFeed(feedText);
  // combo text
  if (gs.killStreak >= 2) {
    spawnComboText(gs.player.x, gs.player.y - 40, 'x' + gs.killStreak + ' COMBO!');
  }
  if (gs.killStreak === 3) showAnnounce('TRIPLE KILL!');
  else if (gs.killStreak === 6) showAnnounce('RAMPAGE!');
  else if (gs.killStreak === 10) showAnnounce('UNSTOPPABLE!');
  checkLevelUp();
  updateHUD();
}

function checkLevelUp() {
  const p = gs.player;
  while (p.xp >= p.xpNext) {
    p.xp -= p.xpNext;
    p.level++;
    p.xpNext = Math.floor(p.xpNext * 1.4);
    p.damage += 5;
    p.maxHp += 15;
    p.hp = Math.min(p.hp + 20, p.maxHp);
    showAnnounce('LEVEL UP! Lv ' + p.level);
    playSound('levelUp');
  }
}

// ─── Orc AI ────────────────────────────────────────────────────────────────
function spawnOrc(forceBoss) {
  const edge = Math.floor(Math.random() * 4);
  let x, y;
  const inner = 60;
  if (edge === 0)      { x = WALL+inner+Math.random()*(WW-(WALL+inner)*2); y = WALL+inner; }
  else if (edge === 1) { x = WALL+inner+Math.random()*(WW-(WALL+inner)*2); y = WH-WALL-inner; }
  else if (edge === 2) { x = WALL+inner; y = WALL+inner+Math.random()*(WH-(WALL+inner)*2); }
  else                 { x = WW-WALL-inner; y = WALL+inner+Math.random()*(WH-(WALL+inner)*2); }

  const wave = gs.wave;
  let type = 'grunt';
  const rand = Math.random();
  // Progressive difficulty
  if (wave >= 16 && rand < 0.18)      type = 'ranged';
  else if (wave >= 11 && rand < 0.28) type = 'armoured';
  else if (wave >= 6  && rand < 0.35) type = 'goblin';
  // wave 1-5: grunts only
  if (wave <= 5) type = 'grunt';

  // Boss logic
  let boss = false;
  if (forceBoss) {
    boss = true;
  }

  const baseHp  = boss ? 300 : (type === 'armoured' ? 80 : (type === 'goblin' ? 25 : 40));
  const baseSpd = boss ? 55  : (type === 'goblin' ? 210 : (type === 'armoured' ? 90 : 130));
  const hpScale = 1 + wave * 0.12;

  const o = {
    x, y, r: boss ? 28 : (type === 'goblin' ? 10 : 13),
    hp: Math.round(baseHp * hpScale),
    maxHp: Math.round(baseHp * hpScale),
    speed: baseSpd,
    damage: boss ? 22 : (type === 'armoured' ? 12 : (type === 'goblin' ? 7 : 10)),
    attackCooldown: 1 + Math.random(),
    type, boss,
    hitFlash: 0,
    kbVx: 0, kbVy: 0, kbTimer: 0, kbGrace: 0,
    rangedTimer: 2 + Math.random() * 1.5,
    wobbleAngle: 0, wobbleTimer: 0,
    zigzagTimer: 0, zigzagOffset: 0,
  };
  gs.orcs.push(o);
  if (boss) {
    playSound('bossSpawn');
    showAnnounce('BOSS INCOMING!');
  }
}

function updateOrcs(dt) {
  const p = gs.player;

  // Separation pass
  for (let i = 0; i < gs.orcs.length; i++) {
    for (let j = i + 1; j < gs.orcs.length; j++) {
      const a = gs.orcs[i], b = gs.orcs[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      const minD = a.r + b.r;
      if (d < minD && d > 0) {
        const push = (minD - d) / 2;
        a.x -= (dx/d) * push; a.y -= (dy/d) * push;
        b.x += (dx/d) * push; b.y += (dy/d) * push;
      }
    }
  }

  for (let i = gs.orcs.length - 1; i >= 0; i--) {
    const o = gs.orcs[i];
    o.hitFlash = Math.max(0, o.hitFlash - dt);
    o.attackCooldown = Math.max(0, o.attackCooldown - dt);
    o.kbTimer = Math.max(0, o.kbTimer - dt);
    o.kbGrace = Math.max(0, o.kbGrace - dt);
    o.rangedTimer = Math.max(0, o.rangedTimer - dt);

    // Knockback movement
    if (o.kbTimer > 0) {
      o.x += o.kbVx * dt;
      o.y += o.kbVy * dt;
      o.kbVx *= Math.pow(0.85, dt * 60);
      o.kbVy *= Math.pow(0.85, dt * 60);
    }

    // Choose target: player or nearest soldier
    let target = p;
    let tDist = dist(o, p);
    for (const s of gs.soldiers) {
      const sd = dist(o, s);
      if (sd < tDist) { target = s; tDist = sd; }
    }

    if (o.kbTimer <= 0) {
      if (o.type === 'ranged') {
        // Ranged: maintain distance 180-220
        const dx = target.x - o.x, dy = target.y - o.y;
        const d = Math.sqrt(dx*dx + dy*dy);
        const ideal = 200;
        if (d < ideal - 20) {
          o.x -= (dx/d) * o.speed * dt;
          o.y -= (dy/d) * o.speed * dt;
        } else if (d > ideal + 20) {
          o.x += (dx/d) * o.speed * dt;
          o.y += (dy/d) * o.speed * dt;
        }
        if (o.rangedTimer <= 0) {
          throwRock(o, p);
          o.rangedTimer = 2.5;
        }
      } else {
        // Melee: move toward target with wobble
        let dx = target.x - o.x, dy = target.y - o.y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d > 1) {
          // Update wobble every 0.5s
          o.wobbleTimer -= dt;
          if (o.wobbleTimer <= 0) {
            o.wobbleTimer = 0.5;
            o.wobbleAngle = (Math.random() - 0.5) * (Math.PI / 6); // ±15 deg
          }
          let moveAngle = Math.atan2(dy, dx) + o.wobbleAngle;
          // Goblin zigzag
          if (o.type === 'goblin') {
            o.zigzagTimer -= dt;
            if (o.zigzagTimer <= 0) {
              o.zigzagTimer = 0.3;
              o.zigzagOffset = (Math.random() < 0.5 ? 1 : -1) * (Math.PI / 5);
            }
            moveAngle += o.zigzagOffset;
          }
          // Near-death desperation speed
          const desperation = (o.hp < o.maxHp * 0.2) ? 1.2 : 1.0;
          o.x += Math.cos(moveAngle) * o.speed * desperation * dt;
          o.y += Math.sin(moveAngle) * o.speed * desperation * dt;
        }
      }
    }

    // Clamp orc to world
    o.x = Math.max(WALL + o.r, Math.min(WW - WALL - o.r, o.x));
    o.y = Math.max(WALL + o.r, Math.min(WH - WALL - o.r, o.y));

    // Attack player
    if (o.kbGrace <= 0 && dist(o, p) < o.r + p.r + 4 && o.attackCooldown <= 0) {
      damagePlayer(o.damage);
      o.attackCooldown = 1.2;
    }
    // Attack soldiers
    for (const s of gs.soldiers) {
      if (dist(o, s) < o.r + s.r + 4 && o.attackCooldown <= 0) {
        s.hp -= o.damage;
        o.attackCooldown = 1.2;
        if (s.hp <= 0) { s.dead = true; }
      }
    }
  }

  // Remove dead orcs
  for (let i = gs.orcs.length - 1; i >= 0; i--) {
    if (gs.orcs[i].hp <= 0) {
      killOrc(gs.orcs[i]);
      gs.orcs.splice(i, 1);
    }
  }
}

function throwRock(orc, target) {
  const dx = target.x - orc.x, dy = target.y - orc.y;
  const d = Math.sqrt(dx*dx + dy*dy) || 1;
  const spd = 220;
  gs.projectiles.push({
    x: orc.x, y: orc.y,
    vx: (dx/d) * spd, vy: (dy/d) * spd,
    r: 6, damage: 8, life: 3,
  });
}

function updateProjectiles(dt) {
  const p = gs.player;
  for (let i = gs.projectiles.length - 1; i >= 0; i--) {
    const pr = gs.projectiles[i];
    pr.x += pr.vx * dt;
    pr.y += pr.vy * dt;
    pr.life -= dt;
    if (pr.life <= 0 || pr.x < WALL || pr.x > WW-WALL || pr.y < WALL || pr.y > WH-WALL) {
      gs.projectiles.splice(i, 1);
      continue;
    }
    if (dist(pr, p) < pr.r + p.r) {
      damagePlayer(pr.damage);
      triggerShake(3, 0.2);
      gs.projectiles.splice(i, 1);
    }
  }
}

function damagePlayer(dmg) {
  const p = gs.player;
  if (p.invincible > 0) return;
  p.hp -= dmg;
  p.invincible = 0.9;
  triggerShake(6, 0.4);
  spawnParticles(p.x, p.y, '#ff4444', 8);
  spawnDmgNum(p.x, p.y - p.r - 10, '-' + dmg, '#f44');
  playSound('playerHurt');
  if (p.hp <= 0) {
    p.hp = 0;
    gs.state = 'dying';
    gs.dtMult = 0.15;
    gs.deathSlowTimer = 1.2;
    playSound('playerHurt', 2.0);
    triggerShake(10, 1.2);
  }
  updateHUD();
}

// ─── Soldiers ──────────────────────────────────────────────────────────────
function updateSoldiers(dt) {
  const p = gs.player;
  for (let i = gs.soldiers.length - 1; i >= 0; i--) {
    const s = gs.soldiers[i];
    if (s.dead) { gs.soldiers.splice(i, 1); continue; }
    s.attackCooldown = Math.max(0, s.attackCooldown - dt);

    // Follow player loosely
    const dx = p.x - s.x, dy = p.y - s.y;
    const d = Math.sqrt(dx*dx + dy*dy);
    const followDist = 50 + i * 25;
    if (d > followDist) {
      s.x += (dx/d) * s.speed * dt;
      s.y += (dy/d) * s.speed * dt;
    }

    // Attack nearest orc
    let nearest = null, nd = 999;
    for (const o of gs.orcs) {
      const od = dist(s, o);
      if (od < nd) { nd = od; nearest = o; }
    }
    if (nearest && nd < 55 && s.attackCooldown <= 0) {
      nearest.hp -= s.damage;
      nearest.hitFlash = 0.1;
      s.attackCooldown = 0.9;
      spawnParticles(nearest.x, nearest.y, '#44cc44', 3);
      if (nearest.hp <= 0) {
        killOrc(nearest);
        nearest.hp = 0; // will be cleaned in updateOrcs
      }
    }

    s.x = Math.max(WALL + s.r, Math.min(WW - WALL - s.r, s.x));
    s.y = Math.max(WALL + s.r, Math.min(WH - WALL - s.r, s.y));
  }
}

function regroupSoldiers() {
  const p = gs.player;
  gs.soldiers.forEach((s, i) => {
    s.x = p.x + Math.cos((i / gs.soldiers.length) * Math.PI * 2) * 40;
    s.y = p.y + Math.sin((i / gs.soldiers.length) * Math.PI * 2) * 40;
  });
}

// ─── Wave System ───────────────────────────────────────────────────────────
let spawnTimer = 0, spawnInterval = 2.0, orcsThisWave = 0, orcsSpawned = 0;
let bossesThisWave = 0, bossesSpawned = 0;
let waveState = 'idle'; // idle | spawning | complete

function startWave() {
  gs.wave++;
  document.getElementById('waveVal').textContent = gs.wave;
  waveKills = 0; waveGold = 0;

  let baseCount = 4 + gs.wave * 2 + (gs.wave > 5 ? gs.wave : 0);
  gs.hordeWave = (gs.wave === 25);
  if (gs.hordeWave) { baseCount *= 2; showAnnounce('HORDE WAVE!!'); }
  if (gs.wave % 5 === 0) baseCount = Math.round(baseCount * 0.7);
  orcsThisWave = baseCount;
  bossesThisWave = 0;
  if (gs.wave % 5 === 0) bossesThisWave = gs.wave >= 40 ? 2 : 1;
  orcsSpawned = 0; bossesSpawned = 0;
  spawnTimer = 0;
  spawnInterval = 0.15; // stagger 0.15s apart
  waveState = 'spawning';
  gs.shopOpen = false;
  document.getElementById('shopOverlay').style.display = 'none';
  showAnnounce('WAVE ' + gs.wave);
}

function showAnnounce(txt) {
  const el = document.getElementById('waveAnnounce');
  el.textContent = txt;
  el.style.opacity = '1';
  el.style.transition = 'none';
  el.style.fontSize = '42px';
  setTimeout(() => {
    el.style.transition = 'opacity 0.8s';
    el.style.opacity = '0';
  }, 1500);
}

function updateWave(dt) {
  if (waveState !== 'spawning') return;
  spawnTimer -= dt;
  if (spawnTimer <= 0 && orcsSpawned < orcsThisWave) {
    spawnOrc(false);
    orcsSpawned++;
    spawnTimer = 0.15;
  }
  // Spawn boss at midpoint
  if (bossesThisWave > 0 && bossesSpawned < bossesThisWave && orcsSpawned >= Math.floor(orcsThisWave / 2)) {
    spawnOrc(true);
    bossesSpawned++;
  }
  if (orcsSpawned >= orcsThisWave && bossesSpawned >= bossesThisWave && gs.orcs.length === 0) {
    waveState = 'complete';
    showWaveCard();
  }
}

let waveCardTimer = 0;
function showWaveCard() {
  const card = document.getElementById('waveCard');
  document.getElementById('wcTitle').textContent = 'WAVE ' + gs.wave + ' COMPLETE!';
  document.getElementById('wcNext').textContent = 'Next: Wave ' + (gs.wave + 1) + ' / 50';
  document.getElementById('wcStats').textContent = 'Kills: ' + waveKills + '   Gold earned: ' + waveGold + 'g';
  card.style.display = 'flex';
  waveCardTimer = 2.5;
  playSound('waveComplete'); spawnSparkles();
  // gold burst sparkle
  for (let i = 0; i < 20; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 80 + Math.random() * 120;
    gs.particles.push({
      x: gs.player.x + (Math.random()-0.5)*100,
      y: gs.player.y + (Math.random()-0.5)*100,
      vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
      r: 3 + Math.random()*3, color: '#ffd700',
      life: 0.6+Math.random()*0.4, maxLife: 1.0,
    });
  }
}

function updateWaveCard(dt) {
  if (waveCardTimer > 0 && waveState === 'complete') {
    waveCardTimer -= dt;
    if (waveCardTimer <= 0) {
      document.getElementById('waveCard').style.display = 'none';
      if (gs.wave >= 50) {
        winGame();
      } else {
        openShop();
      }
    }
  }
}

// ─── Coins ─────────────────────────────────────────────────────────────────
function updateCoins(dt) {
  const p = gs.player;
  for (let i = gs.coins.length - 1; i >= 0; i--) {
    const c = gs.coins[i];
    if (dist(c, p) < c.r + p.r + 14) {
      gs.gold += c.val; // already added at kill, this is for visual pop
      spawnParticles(c.x, c.y, '#ffd700', 3);
      playSound('coin');
      gs.coins.splice(i, 1);
      updateHUD();
    }
  }
}

// ─── HUD ───────────────────────────────────────────────────────────────────
function updateHUD() {
  const p = gs.player;
  document.getElementById('scoreVal').textContent = gs.score;
  document.getElementById('hpFill').style.width = (100 * p.hp / p.maxHp) + '%';
  document.getElementById('hpText').textContent = p.hp + '/' + p.maxHp;
  document.getElementById('xpFill').style.width = (100 * p.xp / p.xpNext) + '%';
  document.getElementById('levelLabel').textContent = 'Lv ' + p.level;
  document.getElementById('goldDisplay').textContent = '\u2605 ' + gs.gold;
}

// ─── Shop ──────────────────────────────────────────────────────────────────
function openShop() {
  if (gs.state !== 'playing' && gs.state !== 'shop') return;
  gs.shopOpen = true;
  gs.state = 'shop';
  const p = gs.player;
  document.getElementById('shopGold').textContent = gs.gold;
  document.getElementById('shopStats').textContent =
    'HP: ' + p.hp + '/' + p.maxHp + '  |  DMG: ' + p.damage + '  |  SPD: ' + p.speed + '  |  ATK LVL: ' + gs.attackSpeedLevel;

  const soldierCost = 80 + gs.soldiers.length * 45;
  const items = [
    { name: 'Heal HP (+50)', cost: 30, key: 'heal',
      disabled: p.hp >= p.maxHp, disabledReason: 'Full HP' },
    { name: 'Max HP +25', cost: 50, key: 'maxhp', disabled: false },
    { name: 'Damage +12', cost: 60, key: 'damage', disabled: false },
    { name: 'Speed +25', cost: 55, key: 'speed', disabled: false },
    { name: 'Faster Attack (Lv ' + (gs.attackSpeedLevel+1) + ')', cost: 70, key: 'atkspd',
      disabled: gs.attackSpeedLevel >= 3, disabledReason: 'Max Level' },
    { name: 'Hire Soldier (have ' + gs.soldiers.length + '/3)', cost: soldierCost, key: 'soldier',
      disabled: gs.soldiers.length >= 3, disabledReason: 'Max 3' },
  ];

  const descs = {
    heal: 'Restore 50 HP instantly',
    maxhp: 'Increase maximum health permanently',
    damage: 'Your sword strikes harder',
    speed: 'Move faster across the battlefield',
    atkspd: 'Reduce swing cooldown',
    soldier: 'Ally who fights alongside you',
  };

  const cont = document.getElementById('shopItems');
  cont.innerHTML = '';
  for (const item of items) {
    const canAfford = gs.gold >= item.cost;
    const isDisabled = item.disabled || !canAfford;
    const div = document.createElement('div');
    const reason = item.disabled ? item.disabledReason : (!canAfford ? 'Need ' + item.cost + 'g' : '');
    div.className = 'shopItem' + (!item.disabled && canAfford ? ' can-afford' : '');
    div.innerHTML = `
      <div class="itemInfo">
        <div class="itemName">${item.name}${reason ? ' <span style="color:#888;font-size:11px">(${reason})</span>' : ''}</div>
        <div class="itemDesc">${descs[item.key] || ''}</div>
      </div>
      <span class="itemCost">${item.cost}g</span>
      <button ${isDisabled ? 'disabled' : ''} onclick="buyItem('${item.key}', ${item.cost})">Buy</button>
    `;
    cont.appendChild(div);
  }

  const shopEl = document.getElementById('shopOverlay');
  shopEl.style.display = 'block';
  shopEl.style.transform = 'translate(-50%,-50%) scale(0.8)';
  shopEl.style.opacity = '0';
  requestAnimationFrame(() => {
    shopEl.style.transition = 'transform 0.18s cubic-bezier(.22,.68,0,1.2), opacity 0.18s';
    shopEl.style.transform = 'translate(-50%,-50%) scale(1.0)';
    shopEl.style.opacity = '1';
  });
}

function closeShop() {
  document.getElementById('shopOverlay').style.display = 'none';
  gs.shopOpen = false;
  gs.state = 'playing';
  if (waveState === 'complete' || waveState === 'idle') {
    startWave();
  }
}

function buyItem(key, cost) {
  if (gs.gold < cost) return;
  gs.gold -= cost;
  const p = gs.player;
  if (key === 'heal') { p.hp = Math.min(p.maxHp, p.hp + 50); }
  else if (key === 'maxhp') { p.maxHp += 25; p.hp += 15; }
  else if (key === 'damage') { p.damage += 12; }
  else if (key === 'speed') { p.speed += 25; }
  else if (key === 'atkspd') { gs.attackSpeedLevel = Math.min(3, gs.attackSpeedLevel + 1); }
  else if (key === 'soldier') {
    const angle = Math.random() * Math.PI * 2;
    gs.soldiers.push({
      x: p.x + Math.cos(angle) * 50,
      y: p.y + Math.sin(angle) * 50,
      r: 12, hp: 80, maxHp: 80,
      speed: 130, damage: 15,
      attackCooldown: 0, dead: false,
    });
  }
  updateHUD();
  openShop(); // refresh
}

// ─── Game Flow ─────────────────────────────────────────────────────────────
function startGame() {
  initGameState();
  gs.state = 'playing';
  document.getElementById('overlay').style.display = 'none';
  updateHUD();
  waveState = 'idle';
  startWave();
}

function gameOver() {
  gs.state = 'gameover';
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <h1 style="color:#f44">GAME OVER</h1>
    <div class="subtitle">Wave ${gs.wave} | Score: ${gs.score}</div>
    <div class="controls-hint">You fought bravely... but the orcs overwhelmed you.</div>
    <button onclick="startGame()">&#9658; TRY AGAIN</button>
  `;
  ov.style.display = 'flex';
}

function winGame() {
  gs.state = 'win';
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <h1 style="color:#ffd700">VICTORY!</h1>
    <div class="subtitle">You survived all 50 waves!</div>
    <div class="controls-hint">Final Score: ${gs.score}<br>A true Knight Orc Assault champion!</div>
    <button onclick="startGame()">&#9658; PLAY AGAIN</button>
  `;
  ov.style.display = 'flex';
}

// ─── Main Update ───────────────────────────────────────────────────────────
let lastTime = 0;

function update(dt) {
  // Death animation
  if (gs.state === 'dying') {
    gs.deathSlowTimer -= dt;
    // slow camera zoom in on player
    camZoomTarget = Math.min(1.5, camZoomTarget + dt * 0.2);
    if (gs.deathSlowTimer <= 0) {
      gs.dtMult = 1.0;
      camZoomTarget = 1.0;
      gameOver();
      return;
    }
    // still update some things during death
    updateCamera(gs.player, dt);
    updateParticles(dt * gs.dtMult);
    updateComboTexts(dt);
    updateSparkles(dt);
    updateKillFeed(dt);
    return;
  }

  if (gs.state !== 'playing') return;
  const p = gs.player;
  const adt = dt * gs.dtMult;

  // Movement
  let mx = 0, my = 0;
  if (keys['KeyW'] || keys['ArrowUp'])    my -= 1;
  if (keys['KeyS'] || keys['ArrowDown'])  my += 1;
  if (keys['KeyA'] || keys['ArrowLeft'])  mx -= 1;
  if (keys['KeyD'] || keys['ArrowRight']) mx += 1;
  if (joystick.active) { mx = joystick.dx; my = joystick.dy; }

  const len = Math.sqrt(mx*mx + my*my);
  if (len > 0) {
    p.x += (mx/len) * p.speed * adt;
    p.y += (my/len) * p.speed * adt;
    p.angle = Math.atan2(my, mx);
  }
  clampPlayer(p);

  p.attackCooldown = Math.max(0, p.attackCooldown - adt);
  p.attackAnim = Math.max(0, p.attackAnim - adt * 4);
  p.invincible = Math.max(0, p.invincible - adt);

  // Combo timer countdown
  if (gs.comboTimer > 0) {
    gs.comboTimer -= dt;
    if (gs.comboTimer <= 0) gs.killStreak = 0;
  }

  updateCamera(p, dt);
  updateOrcs(adt);
  updateProjectiles(adt);
  updateSoldiers(adt);
  updateCoins(adt);
  updateParticles(adt);
  updateComboTexts(dt);
  updateSparkles(dt);
  updateKillFeed(dt);
  updateWave(adt);
  updateWaveCard(dt);
  updateHUD();
}

// ─── Draw ──────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, VW, VH);

  if (gs.state === 'menu' || gs.state === 'gameover' || gs.state === 'win') {
    ctx.fillStyle = '#2a2015';
    ctx.fillRect(0, 0, VW, VH);
    return;
  }

  ctx.save();
  if (camZoom !== 1.0) {
    ctx.translate(VW/2, VH/2);
    ctx.scale(camZoom, camZoom);
    ctx.translate(-VW/2, -VH/2);
  }

  drawWorld();

  // Draw coins
  drawCoins();

  // Draw soldiers
  for (const s of gs.soldiers) drawSoldier(s);

  // Draw orcs
  for (const o of gs.orcs) drawOrc(o);

  // Draw projectiles
  for (const pr of gs.projectiles) drawProjectile(pr);

  // Draw player
  drawPlayer(gs.player);

  // Draw particles + damage numbers
  drawParticles();

  // Combo texts and sparkles
  drawComboTexts(); drawSparkles();

  // Attack range indicator (faint)
  if (gs.player.attackAnim > 0) {
    const p = gs.player;
    ctx.globalAlpha = gs.player.attackAnim * 0.3;
    ctx.strokeStyle = '#ffffaa';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(wx(p.x + Math.cos(p.angle)*28), wy(p.y + Math.sin(p.angle)*28), 52, 0, Math.PI*2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  ctx.restore();

  // Minimap and kill feed (outside zoom transform)
  drawMinimap(); drawKillFeed();
}

// ─── Game Loop ─────────────────────────────────────────────────────────────
function gameLoop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(function(ts) {
  lastTime = ts;
  requestAnimationFrame(gameLoop);
});
</script>
