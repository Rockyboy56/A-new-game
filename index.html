<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Knight Orc Assault</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Georgia', serif; overflow: hidden; }
#gameContainer { position: relative; }
canvas { display: block; cursor: crosshair; }
#hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
#topLeft { position: absolute; top: 10px; left: 10px; color: #fff; text-shadow: 1px 1px 3px #000; }
#topLeft .score { font-size: 18px; font-weight: bold; }
#topLeft .wave { font-size: 14px; color: #ffd700; }
#bottomBar { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.75); padding: 8px 12px; display: flex; align-items: center; gap: 10px; pointer-events: all; }
#barsSection { flex: 1; }
.bar-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
.bar-label { color: #ccc; font-size: 11px; width: 28px; text-align: right; }
.bar-bg { flex: 1; height: 12px; background: #333; border-radius: 6px; overflow: hidden; border: 1px solid #555; }
.bar-fill { height: 100%; border-radius: 6px; transition: width 0.15s; }
#hpFill { background: linear-gradient(90deg, #c00, #f44); }
#xpFill { background: linear-gradient(90deg, #080, #4f4); }
#levelLabel { color: #ffd700; font-size: 13px; font-weight: bold; white-space: nowrap; }
#regroupBtn { background: #4a3; color: #fff; border: 2px solid #6c5; padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; white-space: nowrap; pointer-events: all; font-weight: bold; }
#regroupBtn:hover { background: #5b4; }
#rightHud { display: flex; align-items: center; gap: 8px; }
#goldDisplay { color: #ffd700; font-size: 15px; font-weight: bold; }
#shopBtn { background: #a84; color: #fff; border: 2px solid #cb6; padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; pointer-events: all; font-weight: bold; }
#shopBtn:hover { background: #b95; }
#shopBtn:disabled { background: #555; border-color: #444; cursor: not-allowed; color: #888; }
#waveAnnounce { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 36px; font-weight: bold; text-shadow: 2px 2px 8px #000, 0 0 20px #f80; pointer-events: none; opacity: 0; transition: opacity 0.4s; text-align: center; white-space: nowrap; }
#overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; z-index: 100; }
#overlay h1 { font-size: 42px; margin-bottom: 10px; text-shadow: 0 0 20px currentColor; }
#overlay .subtitle { font-size: 18px; margin-bottom: 16px; color: #ccc; }
#overlay .controls-hint { color: #aaa; font-size: 13px; margin-bottom: 24px; text-align: center; line-height: 1.6; }
#overlay button { background: #a84; color: #fff; border: 3px solid #ffd700; padding: 12px 30px; font-size: 20px; border-radius: 10px; cursor: pointer; font-family: 'Georgia', serif; margin: 5px; }
#overlay button:hover { background: #b95; }
#shopOverlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(20,15,5,0.97); border: 3px solid #a84; border-radius: 12px; padding: 20px; min-width: 300px; max-width: 360px; color: #fff; z-index: 200; display: none; }
#shopOverlay h2 { text-align: center; color: #ffd700; margin-bottom: 5px; font-size: 24px; }
#shopOverlay .goldInfo { text-align: center; color: #ffd700; margin-bottom: 15px; font-size: 14px; }
.shopItem { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; margin-bottom: 6px; background: rgba(255,255,255,0.05); border-radius: 6px; border: 1px solid #555; }
.shopItem .itemName { font-size: 13px; flex: 1; }
.shopItem .itemCost { color: #ffd700; font-size: 12px; margin: 0 10px; }
.shopItem button { background: #8a4; border: 1px solid #6c5; color: #fff; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
.shopItem button:hover:not(:disabled) { background: #9b5; }
.shopItem button:disabled { background: #444; color: #666; cursor: not-allowed; border-color: #333; }
#shopClose { display: block; width: 100%; margin-top: 12px; background: #555; color: #fff; border: 1px solid #777; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 14px; }
#shopClose:hover { background: #666; }
#touchControls { position: absolute; bottom: 60px; left: 0; width: 100%; display: none; pointer-events: none; }
#joystickArea { position: absolute; bottom: 0; left: 20px; width: 110px; height: 110px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); pointer-events: all; touch-action: none; }
#joystickThumb { position: absolute; width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.5); border: 2px solid #fff; top: 50%; left: 50%; transform: translate(-50%,-50%); pointer-events: none; }
#attackBtn { position: absolute; bottom: 10px; right: 30px; width: 70px; height: 70px; border-radius: 50%; background: rgba(100,150,255,0.4); border: 3px solid rgba(100,150,255,0.8); color: #fff; font-size: 13px; font-weight: bold; display: flex; align-items: center; justify-content: center; pointer-events: all; cursor: pointer; touch-action: none; user-select: none; }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div id="hud">
    <div id="topLeft">
      <div class="score">Score: <span id="scoreVal">0</span></div>
      <div class="wave">Wave <span id="waveVal">0</span>/50</div>
    </div>
    <div id="bottomBar">
      <button id="regroupBtn" onclick="regroupSoldiers()">REGROUP</button>
      <div id="barsSection">
        <div class="bar-row">
          <span class="bar-label">HP</span>
          <div class="bar-bg"><div class="bar-fill" id="hpFill" style="width:100%"></div></div>
          <span id="hpText" style="color:#f88;font-size:11px;width:60px">100/100</span>
        </div>
        <div class="bar-row">
          <span class="bar-label">XP</span>
          <div class="bar-bg"><div class="bar-fill" id="xpFill" style="width:0%"></div></div>
          <span id="levelLabel">Lv 1</span>
        </div>
      </div>
      <div id="rightHud">
        <span id="goldDisplay">★ 0</span>
        <button id="shopBtn" onclick="openShop()">SHOP</button>
      </div>
    </div>
    <div id="waveAnnounce"></div>
  </div>
  <div id="overlay">
    <h1 style="color:#ffd700">⚔ KNIGHT ORC ASSAULT</h1>
    <div class="subtitle">Defend the village across 50 waves of orcs!</div>
    <div class="controls-hint">
      WASD / Arrow Keys: Move &nbsp;|&nbsp; Mouse Aim + Click / Space: Attack<br>
      Kill orcs to earn gold &bull; Buy upgrades in the Shop between waves
    </div>
    <button onclick="startGame()">▶ START GAME</button>
  </div>
  <div id="shopOverlay">
    <h2>⚔ SHOP</h2>
    <div class="goldInfo">Gold: <span id="shopGold">0</span> ★</div>
    <div id="shopItems"></div>
    <button id="shopClose" onclick="closeShop()">Continue to Next Wave →</button>
  </div>
  <div id="touchControls">
    <div id="joystickArea"><div id="joystickThumb"></div></div>
    <div id="attackBtn">ATK</div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 800, H = 560;
canvas.width = W;
canvas.height = H;
document.getElementById('gameContainer').style.width = W + 'px';
document.getElementById('gameContainer').style.height = H + 'px';

function scaleCanvas() {
  const scl = Math.min(window.innerWidth / W, window.innerHeight / H);
  const s = Math.min(scl, 1.5);
  document.getElementById('gameContainer').style.transform = 'scale(' + s + ')';
  document.getElementById('gameContainer').style.transformOrigin = 'top center';
  if (window.innerWidth < 700) document.getElementById('touchControls').style.display = 'block';
}
scaleCanvas();
window.addEventListener('resize', scaleCanvas);

// ─── Game State ───────────────────────────────────────────────────────────────
let gs = {};

function initGameState() {
  gs = {
    state: 'menu',
    score: 0,
    wave: 0,
    gold: 0,
    player: null,
    soldiers: [],
    orcs: [],
    coins: [],
    particles: [],
    dmgNums: [],
    shopOpen: false,
    attackSpeedBonus: 0,
  };
  gs.player = {
    x: W / 2, y: H / 2 - 20,
    hp: 100, maxHp: 100,
    damage: 25,
    speed: 160,
    xp: 0, xpNext: 100,
    level: 1,
    angle: 0,
    attackCooldown: 0,
    attackAnim: 0,
    invincible: 0,
    r: 16,
  };
}

// ─── Input ────────────────────────────────────────────────────────────────────
const keys = {};
const mouse = { x: W / 2, y: H / 2 };
const joystick = { active: false, dx: 0, dy: 0 };

window.addEventListener('keydown', function(e) {
  keys[e.code] = true;
  if (e.code === 'Space') { e.preventDefault(); tryAttack(); }
  if (e.code === 'KeyE') openShop();
});
window.addEventListener('keyup', function(e) { keys[e.code] = false; });

canvas.addEventListener('mousemove', function(e) {
  const rect = canvas.getBoundingClientRect();
  const scl = W / rect.width;
  mouse.x = (e.clientX - rect.left) * scl;
  mouse.y = (e.clientY - rect.top) * scl;
});
canvas.addEventListener('mousedown', function(e) {
  if (e.button === 0) tryAttack();
});
canvas.addEventListener('contextmenu', function(e) { e.preventDefault(); });

// Touch joystick
const joystickArea = document.getElementById('joystickArea');
const joystickThumb = document.getElementById('joystickThumb');
const attackBtnEl = document.getElementById('attackBtn');
let joyOrigin = null;

joystickArea.addEventListener('touchstart', function(e) {
  e.preventDefault();
  const rect = joystickArea.getBoundingClientRect();
  joyOrigin = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
  joystick.active = true;
}, { passive: false });

joystickArea.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (!joyOrigin) return;
  const t = e.touches[0];
  const dx = t.clientX - joyOrigin.x;
  const dy = t.clientY - joyOrigin.y;
  const dist = Math.min(Math.hypot(dx, dy), 40);
  const ang = Math.atan2(dy, dx);
  joystick.dx = Math.cos(ang) * (dist / 40);
  joystick.dy = Math.sin(ang) * (dist / 40);
  joystickThumb.style.left = (55 + Math.cos(ang) * dist) + 'px';
  joystickThumb.style.top = (55 + Math.sin(ang) * dist) + 'px';
}, { passive: false });

joystickArea.addEventListener('touchend', function(e) {
  e.preventDefault();
  joystick.active = false; joystick.dx = 0; joystick.dy = 0;
  joystickThumb.style.left = '50%'; joystickThumb.style.top = '50%';
}, { passive: false });

attackBtnEl.addEventListener('touchstart', function(e) { e.preventDefault(); tryAttack(); }, { passive: false });
attackBtnEl.addEventListener('click', function() { tryAttack(); });

// ─── Combat ───────────────────────────────────────────────────────────────────
function angleDiff(a, b) {
  let d = a - b;
  while (d > Math.PI) d -= 2 * Math.PI;
  while (d < -Math.PI) d += 2 * Math.PI;
  return d;
}

function tryAttack() {
  if (!gs || gs.state !== 'playing') return;
  const p = gs.player;
  const cd = 0.55 - gs.attackSpeedBonus;
  if (p.attackCooldown > 0) return;
  p.attackCooldown = Math.max(0.25, cd);
  p.attackAnim = 0.35;
  const sweep = Math.PI * 2 / 3; // 120 degrees
  const reach = 82;
  for (const o of gs.orcs) {
    if (o.dead) continue;
    const ddx = o.x - p.x, ddy = o.y - p.y;
    const dist = Math.hypot(ddx, ddy);
    if (dist > reach + o.r) continue;
    const ang = Math.atan2(ddy, ddx);
    if (Math.abs(angleDiff(ang, p.angle)) < sweep / 2) {
      hitOrc(o, p.damage);
    }
  }
}

function hitOrc(o, dmg) {
  const actual = Math.round(dmg * (0.8 + Math.random() * 0.4));
  o.hp -= actual;
  o.hitFlash = 0.18;
  gs.dmgNums.push({ x: o.x + (Math.random()-0.5)*20, y: o.y - o.r, val: actual, life: 1.0, vy: -60 });
  spawnParticles(o.x, o.y, '#f44', 4);
  if (o.hp <= 0) killOrc(o);
}

function killOrc(o) {
  o.dead = true;
  gs.score += o.scoreVal;
  gainXP(o.xpVal);
  const coinCount = Math.max(1, Math.floor(o.goldVal * (0.7 + Math.random() * 0.6)));
  for (let i = 0; i < coinCount; i++) {
    const ang = Math.random() * Math.PI * 2;
    const d = Math.random() * 20;
    gs.coins.push({ x: o.x + Math.cos(ang) * d, y: o.y + Math.sin(ang) * d, life: 14, r: 5 });
  }
  spawnParticles(o.x, o.y, '#4f4', 8);
}

function gainXP(amt) {
  const p = gs.player;
  p.xp += amt;
  while (p.xp >= p.xpNext) {
    p.xp -= p.xpNext;
    p.level++;
    p.xpNext = Math.floor(p.xpNext * 1.45);
    p.maxHp += 15;
    p.hp = Math.min(p.hp + 30, p.maxHp);
    p.damage += 3;
    showAnnounce('LEVEL UP!  Lv ' + p.level, '#4ff', 1.8);
  }
}

function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = 40 + Math.random() * 90;
    gs.particles.push({ x, y, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd, life: 0.35 + Math.random() * 0.3, color });
  }
}

// ─── Waves ────────────────────────────────────────────────────────────────────
function getWaveData(wave) {
  return {
    count: 4 + Math.floor(wave * 1.9),
    hp: 28 + wave * 14,
    damage: 8 + wave * 1.6,
    speed: 52 + wave * 3.2,
    goldVal: 2 + Math.floor(wave * 0.9),
    scoreVal: 10 + wave * 5,
    xpVal: 14 + wave * 4,
    hasBoss: wave >= 5 && wave % 5 === 0,
  };
}

function spawnWave() {
  if (!gs || gs.state !== 'playing') return;
  gs.orcs = gs.orcs.filter(o => !o.dead);
  const wd = getWaveData(gs.wave);
  const margin = 30;
  for (let i = 0; i < wd.count; i++) {
    const isBoss = wd.hasBoss && i === 0;
    let x, y;
    const side = Math.floor(Math.random() * 4);
    if (side === 0) { x = margin + Math.random() * (W - 2 * margin); y = margin; }
    else if (side === 1) { x = margin + Math.random() * (W - 2 * margin); y = H - 60; }
    else if (side === 2) { x = margin; y = margin + Math.random() * (H - 80 - 2 * margin); }
    else { x = W - margin; y = margin + Math.random() * (H - 80 - 2 * margin); }
    const mult = isBoss ? 3.5 : 1;
    const hp = Math.round(wd.hp * mult);
    gs.orcs.push({
      x, y,
      hp, maxHp: hp,
      damage: wd.damage * (isBoss ? 2 : 1),
      speed: isBoss ? wd.speed * 0.65 : wd.speed,
      goldVal: wd.goldVal * (isBoss ? 6 : 1),
      scoreVal: wd.scoreVal * (isBoss ? 3 : 1),
      xpVal: wd.xpVal * (isBoss ? 3 : 1),
      r: isBoss ? 26 : 14,
      dead: false,
      hitFlash: 0,
      isBoss,
      attackTimer: 0,
    });
  }
}

// ─── Soldiers ─────────────────────────────────────────────────────────────────
function spawnSoldier() {
  const ang = Math.random() * Math.PI * 2;
  gs.soldiers.push({
    x: gs.player.x + Math.cos(ang) * 40,
    y: gs.player.y + Math.sin(ang) * 40,
    hp: 80, maxHp: 80,
    damage: 18,
    speed: 135,
    r: 12,
    angle: 0,
    attackCooldown: 0,
    attackAnim: 0,
    dead: false,
  });
}

function regroupSoldiers() {
  if (!gs || !gs.soldiers) return;
  for (const s of gs.soldiers) {
    if (!s.dead) {
      const ang = Math.random() * Math.PI * 2;
      s.x = gs.player.x + Math.cos(ang) * 40;
      s.y = gs.player.y + Math.sin(ang) * 40;
    }
  }
}

// ─── Shop ─────────────────────────────────────────────────────────────────────
const SHOP_ITEMS = [
  {
    name: '⚕ Heal 50 HP',
    cost: function() { return 30; },
    disabled: function() { return gs.player.hp >= gs.player.maxHp; },
    action: function() { gs.player.hp = Math.min(gs.player.hp + 50, gs.player.maxHp); },
  },
  {
    name: '❤ +25 Max HP',
    cost: function() { return 50; },
    disabled: function() { return false; },
    action: function() { gs.player.maxHp += 25; gs.player.hp = Math.min(gs.player.hp + 25, gs.player.maxHp); },
  },
  {
    name: '⚔ +12 Damage',
    cost: function() { return 60; },
    disabled: function() { return false; },
    action: function() { gs.player.damage += 12; },
  },
  {
    name: '👟 +25 Speed',
    cost: function() { return 55; },
    disabled: function() { return false; },
    action: function() { gs.player.speed += 25; },
  },
  {
    name: '⚡ Faster Attack',
    cost: function() { return 70; },
    disabled: function() { return gs.attackSpeedBonus >= 0.24; },
    action: function() { gs.attackSpeedBonus = Math.min(0.24, gs.attackSpeedBonus + 0.08); },
  },
  {
    name: '🗡 Hire Soldier',
    cost: function() { return 80 + gs.soldiers.filter(function(s) { return !s.dead; }).length * 45; },
    disabled: function() { return gs.soldiers.filter(function(s) { return !s.dead; }).length >= 3; },
    action: function() { spawnSoldier(); },
  },
];

function openShop() {
  if (!gs || gs.state === 'menu' || gs.state === 'gameover' || gs.state === 'win') return;
  gs.shopOpen = true;
  document.getElementById('shopOverlay').style.display = 'block';
  renderShop();
}

function renderShop() {
  document.getElementById('shopGold').textContent = gs.gold;
  const container = document.getElementById('shopItems');
  container.innerHTML = '';
  SHOP_ITEMS.forEach(function(item) {
    const cost = item.cost();
    const isDisabled = item.disabled() || gs.gold < cost;
    const div = document.createElement('div');
    div.className = 'shopItem';
    const nameSpan = document.createElement('span');
    nameSpan.className = 'itemName';
    nameSpan.textContent = item.name;
    const costSpan = document.createElement('span');
    costSpan.className = 'itemCost';
    costSpan.textContent = cost + '★';
    const btn = document.createElement('button');
    btn.textContent = 'Buy';
    btn.disabled = isDisabled;
    btn.addEventListener('click', function() {
      if (!item.disabled() && gs.gold >= item.cost()) {
        gs.gold -= item.cost();
        item.action();
        renderShop();
      }
    });
    div.appendChild(nameSpan);
    div.appendChild(costSpan);
    div.appendChild(btn);
    container.appendChild(div);
  });
}

function closeShop() {
  const wasShopBetween = gs.state === 'between';
  gs.shopOpen = false;
  document.getElementById('shopOverlay').style.display = 'none';
  if (wasShopBetween) {
    gs.wave++;
    gs.state = 'playing';
    showAnnounce('Wave ' + gs.wave + ' / 50 — Incoming!', '#f80', 2.2);
    setTimeout(spawnWave, 1800);
  }
}

// ─── Announcements ────────────────────────────────────────────────────────────
let announceTimeout = null;
function showAnnounce(text, color, duration) {
  const el = document.getElementById('waveAnnounce');
  el.textContent = text;
  el.style.color = color || '#fff';
  el.style.opacity = '1';
  if (announceTimeout) clearTimeout(announceTimeout);
  announceTimeout = setTimeout(function() { el.style.opacity = '0'; }, duration * 1000);
}

// ─── Game flow ────────────────────────────────────────────────────────────────
function startGame() {
  initGameState();
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('shopBtn').disabled = false;
  gs.state = 'playing';
  gs.wave = 1;
  showAnnounce('Wave 1 / 50 — Incoming!', '#f80', 2.2);
  setTimeout(spawnWave, 2000);
  lastTime = 0;
  requestAnimationFrame(loop);
}

function gameOver() {
  gs.state = 'gameover';
  const el = document.getElementById('overlay');
  el.innerHTML =
    '<h1 style="color:#f44">GAME OVER</h1>' +
    '<div class="subtitle">You fell defending the village in Wave ' + gs.wave + '!</div>' +
    '<div style="color:#ffd700;font-size:24px;margin:16px 0">Final Score: ' + gs.score + '</div>' +
    '<button onclick="startGame()">▶ Play Again</button>';
  el.style.display = 'flex';
}

function winGame() {
  gs.state = 'win';
  const el = document.getElementById('overlay');
  el.innerHTML =
    '<h1 style="color:#ffd700">VICTORY!</h1>' +
    '<div class="subtitle">You survived all 50 waves and saved the village!</div>' +
    '<div style="color:#ffd700;font-size:24px;margin:16px 0">Final Score: ' + gs.score + '</div>' +
    '<button onclick="startGame()">▶ Play Again</button>';
  el.style.display = 'flex';
}

// ─── Update ───────────────────────────────────────────────────────────────────
let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  if (gs.state === 'playing') update(dt);

  draw();
  updateHUD();

  if (gs.state !== 'gameover' && gs.state !== 'win' && gs.state !== 'menu') {
    requestAnimationFrame(loop);
  }
}

function update(dt) {
  const p = gs.player;

  // Player movement
  let mvx = 0, mvy = 0;
  if (keys['KeyW'] || keys['ArrowUp']) mvy -= 1;
  if (keys['KeyS'] || keys['ArrowDown']) mvy += 1;
  if (keys['KeyA'] || keys['ArrowLeft']) mvx -= 1;
  if (keys['KeyD'] || keys['ArrowRight']) mvx += 1;
  if (joystick.active) { mvx = joystick.dx; mvy = joystick.dy; }
  const mvlen = Math.hypot(mvx, mvy);
  if (mvlen > 0) { mvx /= mvlen; mvy /= mvlen; }
  p.x = Math.max(p.r, Math.min(W - p.r, p.x + mvx * p.speed * dt));
  p.y = Math.max(p.r, Math.min(H - 52 - p.r, p.y + mvy * p.speed * dt));

  // Aim angle toward mouse
  p.angle = Math.atan2(mouse.y - p.y, mouse.x - p.x);

  // Cooldowns
  if (p.attackCooldown > 0) p.attackCooldown -= dt;
  if (p.attackAnim > 0) p.attackAnim -= dt;
  if (p.invincible > 0) p.invincible -= dt;

  // Coins attraction and pickup
  gs.coins = gs.coins.filter(function(c) {
    c.life -= dt;
    if (c.life <= 0) return false;
    const cdx = p.x - c.x, cdy = p.y - c.y;
    const cdist = Math.hypot(cdx, cdy);
    if (cdist < p.r + c.r + 5) { gs.gold++; return false; }
    if (cdist < 90) {
      c.x += (cdx / cdist) * 140 * dt;
      c.y += (cdy / cdist) * 140 * dt;
    }
    return true;
  });

  // Orcs
  for (const o of gs.orcs) {
    if (o.dead) continue;
    if (o.hitFlash > 0) o.hitFlash -= dt;
    const odx = p.x - o.x, ody = p.y - o.y;
    const odist = Math.hypot(odx, ody);
    if (odist > 0) {
      o.x += (odx / odist) * o.speed * dt;
      o.y += (ody / odist) * o.speed * dt;
    }
    o.x = Math.max(o.r, Math.min(W - o.r, o.x));
    o.y = Math.max(o.r, Math.min(H - 52 - o.r, o.y));

    // Orc attacks player on contact
    if (odist < p.r + o.r + 1) {
      o.attackTimer += dt;
      if (o.attackTimer >= 0.9) {
        o.attackTimer = 0;
        if (p.invincible <= 0) {
          p.hp -= o.damage;
          p.invincible = 0.6;
          spawnParticles(p.x, p.y, '#f00', 5);
          if (p.hp <= 0) { p.hp = 0; gameOver(); return; }
        }
      }
    } else {
      o.attackTimer = 0;
    }
  }

  // Soldiers
  for (const s of gs.soldiers) {
    if (s.dead) continue;

    // Find nearest alive orc within aggro range
    let nearest = null, nearDist = 130;
    for (const o of gs.orcs) {
      if (o.dead) continue;
      const d = Math.hypot(o.x - s.x, o.y - s.y);
      if (d < nearDist) { nearDist = d; nearest = o; }
    }

    if (nearest) {
      // Move toward orc
      const sdx = nearest.x - s.x, sdy = nearest.y - s.y;
      const sd = Math.hypot(sdx, sdy);
      s.angle = Math.atan2(sdy, sdx);
      if (sd > s.r + nearest.r) {
        s.x += (sdx / sd) * s.speed * dt;
        s.y += (sdy / sd) * s.speed * dt;
      }
      // Attack
      s.attackCooldown -= dt;
      if (s.attackCooldown <= 0 && nearDist < 58) {
        s.attackCooldown = 1.1;
        s.attackAnim = 0.25;
        if (!nearest.dead) hitOrc(nearest, s.damage);
      }
    } else {
      // Follow player
      const pdx = p.x - s.x, pdy = p.y - s.y;
      const pd = Math.hypot(pdx, pdy);
      if (pd > 52) {
        s.x += (pdx / pd) * s.speed * dt;
        s.y += (pdy / pd) * s.speed * dt;
      }
    }
    if (s.attackAnim > 0) s.attackAnim -= dt;
    s.x = Math.max(s.r, Math.min(W - s.r, s.x));
    s.y = Math.max(s.r, Math.min(H - 52 - s.r, s.y));
  }

  // Particles
  gs.particles = gs.particles.filter(function(pt) {
    pt.x += pt.vx * dt; pt.y += pt.vy * dt;
    pt.vy += 100 * dt;
    pt.life -= dt;
    return pt.life > 0;
  });

  // Damage numbers
  gs.dmgNums = gs.dmgNums.filter(function(d) {
    d.y += d.vy * dt; d.life -= dt; return d.life > 0;
  });

  // Check wave clear
  if (gs.orcs.filter(function(o) { return !o.dead; }).length === 0 && gs.state === 'playing') {
    if (gs.wave >= 50) {
      winGame();
    } else {
      gs.state = 'between';
      showAnnounce('Wave ' + gs.wave + ' Complete!', '#ffd700', 2.5);
      setTimeout(function() {
        if (gs.state === 'between') openShop();
      }, 2500);
    }
  }
}

// ─── HUD Update ───────────────────────────────────────────────────────────────
function updateHUD() {
  if (!gs || !gs.player) return;
  const p = gs.player;
  document.getElementById('scoreVal').textContent = gs.score;
  document.getElementById('waveVal').textContent = gs.wave;
  document.getElementById('hpFill').style.width = Math.max(0, 100 * p.hp / p.maxHp) + '%';
  document.getElementById('hpText').textContent = Math.max(0, p.hp) + '/' + p.maxHp;
  document.getElementById('xpFill').style.width = (100 * p.xp / p.xpNext) + '%';
  document.getElementById('levelLabel').textContent = 'Lv ' + p.level;
  document.getElementById('goldDisplay').textContent = '★ ' + gs.gold;
}

// ─── Draw ─────────────────────────────────────────────────────────────────────
// Pre-compute environment geometry (static)
const TREE_POS = [[582,58],[562,128],[592,198],[572,260],[612,318]];
const RUBBLE = [[22,168],[32,172],[44,164],[56,170],[68,166],[80,172],[92,166],[104,170]];

function drawEnvironment() {
  // Sandy ground
  ctx.fillStyle = '#c8a46a';
  ctx.fillRect(0, 0, W, H - 50);

  // Ground dirt patches (deterministic)
  ctx.fillStyle = '#b7905a';
  const patchData = [
    [60,80,20,9,0.3],[200,140,30,10,0.8],[380,90,18,8,1.2],[500,200,25,11,0.1],
    [150,280,22,9,0.9],[320,340,28,10,0.4],[460,320,19,8,1.5],[240,400,24,10,0.7],
    [100,380,20,8,0.2],[400,440,26,9,1.1],[550,130,21,9,0.6],[300,180,17,7,1.3],
  ];
  for (const [px,py,rx,ry,rot] of patchData) {
    ctx.beginPath();
    ctx.ellipse(px, py, rx, ry, rot, 0, Math.PI*2);
    ctx.fill();
  }

  // ── Castle ruins (left) ──
  ctx.fillStyle = '#8a8a8a';
  // Main wall segments
  ctx.fillRect(10, 40, 20, 130);
  ctx.fillRect(10, 210, 20, 90);
  ctx.fillRect(30, 40, 90, 20);
  ctx.fillRect(65, 225, 45, 20);
  // Battlements on top wall
  ctx.fillStyle = '#7a7a7a';
  for (let i = 0; i < 5; i++) ctx.fillRect(30 + i * 18, 28, 11, 14);
  // Battlements on left tower
  ctx.fillStyle = '#7a7a7a';
  for (let i = 0; i < 3; i++) ctx.fillRect(10, 26 + i * 14, 8, 10);
  // Window opening
  ctx.fillStyle = '#444';
  ctx.fillRect(52, 58, 22, 32);
  ctx.fillRect(70, 238, 14, 24);
  // Stone texture lines
  ctx.strokeStyle = '#6a6a6a'; ctx.lineWidth = 1;
  for (let i = 0; i < 6; i++) ctx.strokeRect(11, 50 + i*22, 18, 20);
  for (let i = 0; i < 4; i++) ctx.strokeRect(32 + i*22, 42, 20, 16);
  // Rubble
  ctx.fillStyle = '#9a9a9a';
  for (let i = 0; i < RUBBLE.length; i++) {
    const [rx,ry] = RUBBLE[i];
    ctx.fillRect(rx, ry, 8 + (i%4)*2, 6 + (i%3)*2);
  }

  // ── Village buildings (right) ──
  // House 1
  ctx.fillStyle = '#c09a6a';
  ctx.fillRect(648, 58, 94, 74);
  ctx.fillStyle = '#7a3a08';
  ctx.beginPath();
  ctx.moveTo(638, 58); ctx.lineTo(695, 16); ctx.lineTo(752, 58); ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#6a2a04';
  // Roof slats
  for (let i = 0; i < 6; i++) {
    ctx.fillRect(640 + i*18, 28+i*5, 2, 35-i*5);
  }
  ctx.fillStyle = '#3a2008';
  ctx.fillRect(678, 92, 18, 40); // Door
  ctx.fillStyle = '#a0c8e8';
  ctx.fillRect(655, 72, 18, 18); ctx.fillRect(718, 72, 18, 18); // Windows
  ctx.strokeStyle = '#4a3010'; ctx.lineWidth = 2;
  ctx.strokeRect(655, 72, 18, 18); ctx.strokeRect(718, 72, 18, 18);
  // Cross-frames on windows
  ctx.beginPath(); ctx.moveTo(664,72); ctx.lineTo(664,90); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(655,81); ctx.lineTo(673,81); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(727,72); ctx.lineTo(727,90); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(718,81); ctx.lineTo(736,81); ctx.stroke();

  // House 2
  ctx.fillStyle = '#b8926a';
  ctx.fillRect(650, 172, 72, 60);
  ctx.fillStyle = '#6a3406';
  ctx.beginPath();
  ctx.moveTo(642, 172); ctx.lineTo(686, 140); ctx.lineTo(730, 172); ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#3a2008';
  ctx.fillRect(670, 200, 14, 32);
  ctx.fillStyle = '#a0c8e8';
  ctx.fillRect(653, 184, 14, 14); ctx.fillRect(706, 184, 14, 14);
  ctx.strokeStyle = '#4a3010'; ctx.lineWidth = 1.5;
  ctx.strokeRect(653, 184, 14, 14); ctx.strokeRect(706, 184, 14, 14);

  // Fence
  ctx.strokeStyle = '#6b3a18'; ctx.lineWidth = 3;
  for (let i = 0; i < 7; i++) {
    const fx = 125 + i * 62;
    ctx.beginPath(); ctx.moveTo(fx, H-66); ctx.lineTo(fx, H-92); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(fx+31, H-66); ctx.lineTo(fx+31, H-92); ctx.stroke();
    // Horizontal rails
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(fx, H-76); ctx.lineTo(fx+62, H-76); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(fx, H-88); ctx.lineTo(fx+62, H-88); ctx.stroke();
    ctx.lineWidth = 3;
  }

  // Trees
  for (const [tx,ty] of TREE_POS) {
    ctx.fillStyle = '#5a2c0a';
    ctx.fillRect(tx-4, ty-5, 8, 28);
    ctx.fillStyle = '#256025';
    ctx.beginPath(); ctx.arc(tx, ty-14, 20, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#308030';
    ctx.beginPath(); ctx.arc(tx-5, ty-16, 14, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#44a044';
    ctx.beginPath(); ctx.arc(tx+4, ty-20, 10, 0, Math.PI*2); ctx.fill();
  }

  // Path from center to castle
  ctx.fillStyle = 'rgba(180,150,100,0.3)';
  ctx.beginPath();
  ctx.ellipse(W/2 - 50, H/2 - 10, 200, 80, -0.2, 0, Math.PI*2);
  ctx.fill();
}

function drawPlayer(p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.angle);

  // Attack arc
  if (p.attackAnim > 0) {
    const alpha = (p.attackAnim / 0.35) * 0.4;
    ctx.fillStyle = 'rgba(80,150,255,' + alpha + ')';
    ctx.strokeStyle = 'rgba(120,190,255,' + (alpha * 2) + ')';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, 82, -Math.PI/3, Math.PI/3);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }

  // Blink when invincible
  const blink = p.invincible > 0 && Math.floor(p.invincible * 12) % 2 === 0;
  if (!blink) {
    // Cape
    ctx.fillStyle = '#aa1111';
    ctx.beginPath(); ctx.ellipse(-5, 2, 9, 14, 0, 0, Math.PI*2); ctx.fill();
    // Armor body
    ctx.fillStyle = '#b0b8c8';
    ctx.fillRect(-11, -14, 22, 26);
    // Armor shading
    ctx.fillStyle = '#909aaa';
    ctx.fillRect(-11, 6, 22, 6);
    // Helmet
    ctx.fillStyle = '#8898a8';
    ctx.fillRect(-10, -21, 20, 10);
    ctx.fillStyle = '#6688aa';
    ctx.fillRect(-5, -17, 10, 5); // visor slit
    // Plume
    ctx.fillStyle = '#cc2222';
    ctx.fillRect(-2, -28, 4, 10);
    // Sword
    ctx.fillStyle = '#d0d8e8';
    ctx.fillRect(12, -20, 6, 34);
    ctx.fillStyle = '#c0c8d8';
    ctx.fillRect(13, -20, 3, 34);
    // Sword guard
    ctx.fillStyle = '#a08840';
    ctx.fillRect(7, -5, 16, 6);
    // Shield
    ctx.fillStyle = '#1a38a8';
    ctx.beginPath();
    ctx.moveTo(-18, -14); ctx.lineTo(-8, -14); ctx.lineTo(-8, 8); ctx.lineTo(-13, 14); ctx.lineTo(-18, 8);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#ffd700';
    ctx.fillRect(-16, -6, 5, 5);
  }
  ctx.restore();
}

function drawSoldier(s) {
  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.rotate(s.angle || 0);

  // Attack flash
  if (s.attackAnim > 0) {
    const alpha = (s.attackAnim / 0.25) * 0.3;
    ctx.fillStyle = 'rgba(220,220,80,' + alpha + ')';
    ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0, 0, 56, -Math.PI/3, Math.PI/3); ctx.closePath();
    ctx.fill();
  }

  // Body
  ctx.fillStyle = '#7a9a3a';
  ctx.fillRect(-8, -13, 16, 22);
  // Helmet
  ctx.fillStyle = '#5a7a2a';
  ctx.fillRect(-7, -20, 14, 9);
  // Spear
  ctx.fillStyle = '#9a7050';
  ctx.fillRect(10, -18, 4, 30);
  ctx.fillStyle = '#c0c0d0';
  ctx.beginPath(); ctx.moveTo(10,-18); ctx.lineTo(14,-18); ctx.lineTo(12,-30); ctx.closePath(); ctx.fill();

  ctx.restore();

  // HP bar
  if (s.hp < s.maxHp) {
    const bw = 24;
    ctx.fillStyle = '#300'; ctx.fillRect(s.x - bw/2, s.y - s.r - 9, bw, 4);
    ctx.fillStyle = '#f44'; ctx.fillRect(s.x - bw/2, s.y - s.r - 9, bw * (s.hp/s.maxHp), 4);
  }
}

function drawOrc(o) {
  if (o.dead) return;
  ctx.save();
  ctx.translate(o.x, o.y);

  // Compute movement direction for facing
  const flashCol = o.hitFlash > 0;

  if (o.isBoss) {
    // Boss orc — larger, darker
    ctx.fillStyle = flashCol ? '#ccffcc' : '#1a6b1a';
    ctx.fillRect(-o.r, -o.r, o.r*2, o.r*2);
    ctx.fillStyle = flashCol ? '#aaffaa' : '#0f4f0f';
    ctx.fillRect(-o.r, -o.r, o.r*2, o.r*0.45); // head band
    // Tusks
    ctx.fillStyle = '#fffacc';
    ctx.fillRect(-o.r*0.65, o.r*0.3, 7, 12);
    ctx.fillRect(o.r*0.3, o.r*0.3, 7, 12);
    // Eyes
    ctx.fillStyle = '#f00';
    ctx.beginPath(); ctx.arc(-o.r*0.38, -o.r*0.08, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(o.r*0.38, -o.r*0.08, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#600';
    ctx.beginPath(); ctx.arc(-o.r*0.36, -o.r*0.1, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(o.r*0.36, -o.r*0.1, 2, 0, Math.PI*2); ctx.fill();
    // Axe
    ctx.fillStyle = '#777';
    ctx.fillRect(o.r, -o.r*0.9, 6, o.r*1.8);
    ctx.fillRect(o.r-4, -o.r*0.9, 14, 14);
    // Crown
    ctx.fillStyle = '#ffd700';
    for (let i = 0; i < 3; i++) ctx.fillRect(-o.r*0.5 + i*o.r*0.45, -o.r-6, 8, 8);
  } else {
    // Normal orc
    ctx.fillStyle = flashCol ? '#ccffcc' : '#3cb83c';
    ctx.beginPath();
    ctx.ellipse(0, 0, o.r, o.r*0.88, 0, 0, Math.PI*2);
    ctx.fill();
    // Head area
    ctx.fillStyle = flashCol ? '#bbffbb' : '#2eaa2e';
    ctx.beginPath(); ctx.ellipse(0, -o.r*0.35, o.r*0.75, o.r*0.5, 0, 0, Math.PI*2); ctx.fill();
    // Eyes
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(-o.r*0.28, -o.r*0.3, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(o.r*0.28, -o.r*0.3, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#f00';
    ctx.beginPath(); ctx.arc(-o.r*0.26, -o.r*0.32, 1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(o.r*0.26, -o.r*0.32, 1, 0, Math.PI*2); ctx.fill();
    // Tusks
    ctx.fillStyle = '#fffacc';
    ctx.fillRect(-o.r*0.45, o.r*0.12, 4, 8);
    ctx.fillRect(o.r*0.18, o.r*0.12, 4, 8);
    // Club
    ctx.fillStyle = '#7a3a10';
    ctx.fillRect(o.r*0.65, -o.r*0.2, 4, o.r*1.0);
    ctx.fillStyle = '#5a2a08';
    ctx.fillRect(o.r*0.52, o.r*0.5, 11, 9);
    // Studs on club
    ctx.fillStyle = '#888';
    ctx.beginPath(); ctx.arc(o.r*0.6, o.r*0.56, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(o.r*0.8, o.r*0.6, 2, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // HP bar above orc
  const bw = o.isBoss ? 52 : 28;
  const bh = o.isBoss ? 6 : 4;
  ctx.fillStyle = '#300';
  ctx.fillRect(o.x - bw/2, o.y - o.r - 11, bw, bh);
  ctx.fillStyle = o.isBoss ? '#f80' : '#f44';
  ctx.fillRect(o.x - bw/2, o.y - o.r - 11, bw * Math.max(0, o.hp/o.maxHp), bh);
  // Boss label
  if (o.isBoss) {
    ctx.fillStyle = '#ff8800';
    ctx.font = 'bold 10px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText('BOSS', o.x, o.y - o.r - 14);
    ctx.textAlign = 'left';
  }
}

function drawCoin(c) {
  ctx.fillStyle = '#ffd700';
  ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#b8860b'; ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = '#fffaaa';
  ctx.beginPath(); ctx.arc(c.x - 1.2, c.y - 1.2, c.r*0.35, 0, Math.PI*2); ctx.fill();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawEnvironment();

  // Ground bar separator
  ctx.fillStyle = '#3a2a08';
  ctx.fillRect(0, H-52, W, 4);

  // Coins
  for (const c of gs.coins) drawCoin(c);

  // Orcs (draw dead ones first so they're underneath)
  for (const o of gs.orcs) if (!o.dead) drawOrc(o);

  // Soldiers
  for (const s of gs.soldiers) if (!s.dead) drawSoldier(s);

  // Player
  drawPlayer(gs.player);

  // Particles
  for (const pt of gs.particles) {
    const alpha = Math.max(0, pt.life / 0.5);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = pt.color;
    ctx.beginPath(); ctx.arc(pt.x, pt.y, 3, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Damage numbers
  ctx.textAlign = 'center';
  for (const d of gs.dmgNums) {
    const alpha = Math.max(0, d.life);
    ctx.globalAlpha = alpha;
    const sz = 14 + Math.round((1 - d.life) * 5);
    ctx.font = 'bold ' + sz + 'px Georgia';
    ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
    ctx.strokeText(d.val, d.x, d.y);
    ctx.fillStyle = '#ffee44';
    ctx.fillText(d.val, d.x, d.y);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
initGameState();
draw();
updateHUD();
</script>
