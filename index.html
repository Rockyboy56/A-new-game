<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 12px;
      letter-spacing: 4px;
      color: #4ecca3;
      text-transform: uppercase;
    }

    #scoreboard {
      display: flex;
      gap: 40px;
      margin-bottom: 16px;
      font-size: 1rem;
      letter-spacing: 1px;
    }

    #scoreboard span {
      color: #aaa;
    }

    #scoreboard strong {
      color: #4ecca3;
    }

    #game-container {
      position: relative;
    }

    canvas {
      display: block;
      border: 2px solid #4ecca3;
      border-radius: 4px;
      box-shadow: 0 0 30px rgba(78, 204, 163, 0.3);
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(26, 26, 46, 0.88);
      border-radius: 4px;
    }

    #overlay h2 {
      font-size: 1.8rem;
      color: #4ecca3;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    #overlay p {
      color: #aaa;
      margin-bottom: 24px;
      font-size: 0.95rem;
    }

    #overlay .final-score {
      font-size: 1.1rem;
      color: #eee;
      margin-bottom: 24px;
    }

    button {
      padding: 10px 32px;
      font-size: 1rem;
      background: #4ecca3;
      color: #1a1a2e;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      letter-spacing: 1px;
      transition: background 0.2s;
    }

    button:hover {
      background: #38b28a;
    }

    #controls {
      margin-top: 16px;
      font-size: 0.8rem;
      color: #555;
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <h1>Snake</h1>

  <div id="scoreboard">
    <div><span>Score: </span><strong id="score">0</strong></div>
    <div><span>Best: </span><strong id="best">0</strong></div>
    <div><span>Level: </span><strong id="level">1</strong></div>
  </div>

  <div id="game-container">
    <canvas id="canvas" width="400" height="400"></canvas>
    <div id="overlay">
      <h2 id="overlay-title">Snake</h2>
      <p id="overlay-msg">Use arrow keys or WASD to move</p>
      <div class="final-score" id="final-score" style="display:none"></div>
      <button id="start-btn">Start Game</button>
    </div>
  </div>

  <div id="controls">
    Arrow keys / WASD to move &nbsp;|&nbsp; P to pause
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const levelEl = document.getElementById('level');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayMsg = document.getElementById('overlay-msg');
    const finalScore = document.getElementById('final-score');
    const startBtn = document.getElementById('start-btn');

    const GRID = 20;
    const COLS = canvas.width / GRID;
    const ROWS = canvas.height / GRID;

    let snake, dir, nextDir, food, score, best, level, speed, gameLoop, running, paused;

    best = parseInt(localStorage.getItem('snakeBest') || '0');
    bestEl.textContent = best;

    function init() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 },
      ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      level = 1;
      speed = 150;
      scoreEl.textContent = 0;
      levelEl.textContent = 1;
      placeFood();
    }

    function placeFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS),
        };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function step() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        return endGame();
      }

      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        return endGame();
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += level * 10;
        scoreEl.textContent = score;
        if (score > best) {
          best = score;
          bestEl.textContent = best;
          localStorage.setItem('snakeBest', best);
        }
        // Level up every 5 foods
        if (snake.length % 5 === 0) {
          level = Math.min(level + 1, 10);
          levelEl.textContent = level;
          speed = Math.max(60, 150 - (level - 1) * 10);
          clearInterval(gameLoop);
          gameLoop = setInterval(tick, speed);
        }
        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function tick() {
      if (!paused) step();
    }

    function draw() {
      // Background
      ctx.fillStyle = '#16213e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid dots
      ctx.fillStyle = '#1f2b50';
      for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
          ctx.fillRect(x * GRID + GRID / 2 - 1, y * GRID + GRID / 2 - 1, 2, 2);
        }
      }

      // Food
      const fx = food.x * GRID;
      const fy = food.y * GRID;
      ctx.fillStyle = '#e94560';
      ctx.beginPath();
      ctx.arc(fx + GRID / 2, fy + GRID / 2, GRID / 2 - 2, 0, Math.PI * 2);
      ctx.fill();
      // Food shine
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.arc(fx + GRID / 2 - 3, fy + GRID / 2 - 3, 3, 0, Math.PI * 2);
      ctx.fill();

      // Snake
      snake.forEach((seg, i) => {
        const t = i / snake.length;
        // Gradient from head (bright) to tail (dim)
        const r = Math.round(78 - t * 30);
        const g = Math.round(204 - t * 80);
        const b = Math.round(163 - t * 60);
        ctx.fillStyle = `rgb(${r},${g},${b})`;

        const x = seg.x * GRID + 1;
        const y = seg.y * GRID + 1;
        const s = GRID - 2;
        const radius = i === 0 ? 6 : 3;
        roundRect(x, y, s, s, radius);
        ctx.fill();

        // Head eyes
        if (i === 0) {
          ctx.fillStyle = '#1a1a2e';
          const ex = dir.x === 0 ? 4 : (dir.x > 0 ? 10 : 4);
          const ey = dir.y === 0 ? 4 : (dir.y > 0 ? 10 : 4);
          ctx.beginPath();
          ctx.arc(seg.x * GRID + ex, seg.y * GRID + ey, 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(seg.x * GRID + (dir.x === 0 ? GRID - 4 : ex), seg.y * GRID + (dir.y === 0 ? GRID - 4 : ey), 2, 0, Math.PI * 2);
          ctx.fill();
        }
      });
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function startGame() {
      init();
      overlay.style.display = 'none';
      running = true;
      paused = false;
      draw();
      gameLoop = setInterval(tick, speed);
    }

    function endGame() {
      clearInterval(gameLoop);
      running = false;
      overlayTitle.textContent = 'Game Over';
      overlayMsg.textContent = '';
      finalScore.style.display = 'block';
      finalScore.textContent = `Score: ${score}  |  Best: ${best}`;
      startBtn.textContent = 'Play Again';
      overlay.style.display = 'flex';
    }

    startBtn.addEventListener('click', startGame);

    document.addEventListener('keydown', e => {
      if (!running) return;

      if (e.key === 'p' || e.key === 'P') {
        paused = !paused;
        if (paused) {
          overlayTitle.textContent = 'Paused';
          overlayMsg.textContent = 'Press P to resume';
          finalScore.style.display = 'none';
          startBtn.style.display = 'none';
          overlay.style.display = 'flex';
        } else {
          overlay.style.display = 'none';
          startBtn.style.display = '';
        }
        return;
      }

      const keys = {
        ArrowUp:    { x: 0, y: -1 },
        ArrowDown:  { x: 0, y:  1 },
        ArrowLeft:  { x: -1, y: 0 },
        ArrowRight: { x:  1, y: 0 },
        w: { x: 0, y: -1 },
        s: { x: 0, y:  1 },
        a: { x: -1, y: 0 },
        d: { x:  1, y: 0 },
        W: { x: 0, y: -1 },
        S: { x: 0, y:  1 },
        A: { x: -1, y: 0 },
        D: { x:  1, y: 0 },
      };

      const newDir = keys[e.key];
      if (!newDir) return;

      // Prevent reversing
      if (newDir.x === -dir.x && newDir.y === -dir.y) return;
      nextDir = newDir;

      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
        e.preventDefault();
      }
    });
  </script>
</body>
</html>
