<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
      user-select: none;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 12px;
      color: #4ecca3;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    #scoreboard {
      display: flex;
      gap: 40px;
      margin-bottom: 16px;
      font-size: 1rem;
    }
    #scoreboard span { color: #4ecca3; font-weight: bold; font-size: 1.2rem; }
    #game-container {
      position: relative;
    }
    canvas {
      display: block;
      border: 3px solid #4ecca3;
      border-radius: 6px;
      background: #0f3460;
      box-shadow: 0 0 30px rgba(78,204,163,0.3);
    }
    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(15, 52, 96, 0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      gap: 16px;
    }
    #overlay h2 {
      font-size: 2.2rem;
      color: #e94560;
      letter-spacing: 2px;
    }
    #overlay .final-score {
      font-size: 1.1rem;
      color: #ccc;
    }
    #overlay .final-score span {
      color: #4ecca3;
      font-weight: bold;
      font-size: 1.4rem;
    }
    button {
      padding: 12px 36px;
      font-size: 1rem;
      background: #4ecca3;
      color: #1a1a2e;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      letter-spacing: 1px;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 0 4px 15px rgba(78,204,163,0.4);
    }
    button:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(78,204,163,0.6); }
    button:active { transform: scale(0.97); }
    #controls {
      margin-top: 18px;
      font-size: 0.8rem;
      color: #666;
      text-align: center;
    }
    #dpad {
      display: none;
      margin-top: 20px;
      grid-template-columns: repeat(3, 52px);
      grid-template-rows: repeat(3, 52px);
      gap: 4px;
    }
    .dpad-btn {
      background: rgba(78,204,163,0.15);
      border: 2px solid #4ecca3;
      border-radius: 8px;
      color: #4ecca3;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s;
    }
    .dpad-btn:active { background: rgba(78,204,163,0.4); }
    @media (max-width: 600px) {
      #dpad { display: grid; }
      canvas { width: 320px; height: 320px; }
    }
  </style>
</head>
<body>
  <h1>Snake</h1>
  <div id="scoreboard">
    <div>Score: <span id="score">0</span></div>
    <div>Best: <span id="best">0</span></div>
  </div>
  <div id="game-container">
    <canvas id="canvas" width="400" height="400"></canvas>
    <div id="overlay">
      <h2 style="color:#4ecca3">SNAKE</h2>
      <p style="color:#aaa;font-size:0.95rem">Use arrow keys or swipe to play</p>
      <button id="start-btn">Start Game</button>
    </div>
  </div>
  <div id="dpad">
    <div></div>
    <div class="dpad-btn" id="btn-up">&#9650;</div>
    <div></div>
    <div class="dpad-btn" id="btn-left">&#9664;</div>
    <div></div>
    <div class="dpad-btn" id="btn-right">&#9654;</div>
    <div></div>
    <div class="dpad-btn" id="btn-down">&#9660;</div>
    <div></div>
  </div>
  <div id="controls">Arrow keys to move &nbsp;|&nbsp; P to pause</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const overlay = document.getElementById('overlay');

    const GRID = 20;
    const COLS = canvas.width / GRID;
    const ROWS = canvas.height / GRID;

    let snake, dir, nextDir, food, score, best, running, paused, loopId;
    best = parseInt(localStorage.getItem('snakeBest') || '0');
    bestEl.textContent = best;

    function rand(min, max) { return Math.floor(Math.random() * (max - min)) + min; }

    function spawnFood() {
      let pos;
      do {
        pos = { x: rand(0, COLS), y: rand(0, ROWS) };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      return pos;
    }

    function init() {
      const cx = Math.floor(COLS / 2), cy = Math.floor(ROWS / 2);
      snake = [{ x: cx, y: cy }, { x: cx - 1, y: cy }, { x: cx - 2, y: cy }];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      scoreEl.textContent = 0;
      food = spawnFood();
      running = true;
      paused = false;
    }

    function drawGrid() {
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= canvas.width; x += GRID) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
      }
      for (let y = 0; y <= canvas.height; y += GRID) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
      }
    }

    function drawFood() {
      const x = food.x * GRID + GRID / 2, y = food.y * GRID + GRID / 2, r = GRID / 2 - 2;
      const grd = ctx.createRadialGradient(x, y, 0, x, y, r + 6);
      grd.addColorStop(0, 'rgba(233,69,96,0.4)');
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(x, y, r + 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#e94560';
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath(); ctx.arc(x - 2, y - 2, r * 0.35, 0, Math.PI * 2); ctx.fill();
    }

    function drawSnake() {
      snake.forEach((seg, i) => {
        const x = seg.x * GRID, y = seg.y * GRID;
        const isHead = i === 0;
        ctx.fillStyle = isHead ? '#4ecca3' : '#38b28a';
        const pad = isHead ? 1 : 2;
        ctx.beginPath();
        ctx.roundRect(x + pad, y + pad, GRID - pad * 2, GRID - pad * 2, isHead ? 5 : 3);
        ctx.fill();
        if (isHead) {
          ctx.fillStyle = '#1a1a2e';
          const eyeSize = 2.5;
          const ex1 = dir.y === 0 ? x + (dir.x > 0 ? GRID - 7 : 5) : x + 5;
          const ey1 = dir.x === 0 ? y + (dir.y > 0 ? GRID - 7 : 5) : y + 5;
          const ex2 = dir.y === 0 ? ex1 : x + GRID - 7;
          const ey2 = dir.x === 0 ? ey1 : y + GRID - 7;
          ctx.beginPath(); ctx.arc(ex1, ey1, eyeSize, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(ex2, ey2, eyeSize, 0, Math.PI * 2); ctx.fill();
        }
      });
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawGrid();
      drawFood();
      drawSnake();
    }

    function step() {
      dir = { ...nextDir };
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
      if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();
      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = score;
        if (score > best) {
          best = score;
          bestEl.textContent = best;
          localStorage.setItem('snakeBest', best);
        }
        food = spawnFood();
      } else {
        snake.pop();
      }
      draw();
    }

    function getSpeed() { return Math.max(60, 150 - Math.floor(score / 5) * 10); }

    function gameLoop() {
      if (!running || paused) return;
      step();
      if (running) loopId = setTimeout(gameLoop, getSpeed());
    }

    function gameOver() {
      running = false;
      clearTimeout(loopId);
      draw();
      ctx.fillStyle = 'rgba(233,69,96,0.12)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      overlay.innerHTML =
        '<h2>GAME OVER</h2>' +
        '<p class="final-score">Score: <span>' + score + '</span> &nbsp; Best: <span>' + best + '</span></p>' +
        '<button id="restart-btn">Restart</button>';
      overlay.style.display = 'flex';
      document.getElementById('restart-btn').addEventListener('click', startGame);
    }

    function startGame() {
      overlay.style.display = 'none';
      init();
      draw();
      loopId = setTimeout(gameLoop, getSpeed());
    }

    const KEY_MAP = {
      ArrowUp: { x: 0, y: -1 }, ArrowDown: { x: 0, y: 1 },
      ArrowLeft: { x: -1, y: 0 }, ArrowRight: { x: 1, y: 0 },
      w: { x: 0, y: -1 }, s: { x: 0, y: 1 },
      a: { x: -1, y: 0 }, d: { x: 1, y: 0 },
    };

    document.addEventListener('keydown', e => {
      if (e.key === 'p' || e.key === 'P') {
        if (!running) return;
        paused = !paused;
        if (!paused) loopId = setTimeout(gameLoop, getSpeed());
        return;
      }
      const d = KEY_MAP[e.key];
      if (d && running && !paused) {
        if (d.x === -dir.x && d.y === -dir.y) return;
        nextDir = d;
        e.preventDefault();
      }
    });

    let touchStartX = 0, touchStartY = 0;
    canvas.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      e.preventDefault();
    }, { passive: false });
    canvas.addEventListener('touchend', e => {
      if (!running || paused) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
      let d;
      if (Math.abs(dx) > Math.abs(dy)) {
        d = dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 };
      } else {
        d = dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 };
      }
      if (d.x === -dir.x && d.y === -dir.y) return;
      nextDir = d;
      e.preventDefault();
    }, { passive: false });

    function setDir(d) {
      if (!running || paused) return;
      if (d.x === -dir.x && d.y === -dir.y) return;
      nextDir = d;
    }
    document.getElementById('btn-up').addEventListener('click', () => setDir({ x: 0, y: -1 }));
    document.getElementById('btn-down').addEventListener('click', () => setDir({ x: 0, y: 1 }));
    document.getElementById('btn-left').addEventListener('click', () => setDir({ x: -1, y: 0 }));
    document.getElementById('btn-right').addEventListener('click', () => setDir({ x: 1, y: 0 }));

    document.getElementById('start-btn').addEventListener('click', startGame);

    draw();
  </script>
</body>
</html>
